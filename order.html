<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Order — Harmoni</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      body { background: white; }
      .invoice-doc { box-shadow: none !important; border: none !important; }
    }
    .print-only { display: none; }
  </style>
</head>
<body>
<div class="layout">
  <nav id="sidebar"></nav>
  <main class="main">
    <div id="pageContent"><div class="loading">Memuat…</div></div>
  </main>
</div>

<!-- PIN Approval Modal -->
<div id="pinModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:20px">
  <div style="background:white;border-radius:16px;padding:28px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.2)">
    <h3 style="font-size:16px;font-weight:800;margin-bottom:4px" id="pinModalTitle">Approval Diperlukan</h3>
    <p style="font-size:13px;color:rgba(3,69,67,.5);margin-bottom:20px" id="pinModalDesc"></p>
    <div class="form-group" style="margin-bottom:12px">
      <label style="font-size:12px">Kepala Cabang</label>
      <select id="pinManagerSelect" style="font-size:13px"></select>
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label style="font-size:12px">PIN</label>
      <input type="password" id="pinInput" placeholder="Masukkan PIN" maxlength="6" inputmode="numeric"
        style="font-size:20px;letter-spacing:.2em;text-align:center"
        onkeydown="if(event.key==='Enter') confirmPin()">
      <p id="pinError" style="display:none;color:#b91c1c;font-size:12px;margin-top:4px">PIN salah, coba lagi</p>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="closePinModal()" class="btn btn-ghost" style="flex:1;justify-content:center">Batal</button>
      <button onclick="confirmPin()" class="btn btn-primary" style="flex:1;justify-content:center" id="pinConfirmBtn">Konfirmasi</button>
    </div>
  </div>
</div>

<!-- Edit Order Modal -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:20px;overflow-y:auto">
  <div style="background:white;border-radius:16px;padding:28px;width:100%;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,.2);margin:auto">
    <h3 style="font-size:16px;font-weight:800;margin-bottom:20px">Edit Order</h3>
    <div class="form-group"><label>Nama Pemesan</label><input type="text" id="editName"></div>
    <div class="form-group"><label>Target Selesai</label><input type="date" id="editDueDate"></div>
    <div class="grid-2">
      <div class="form-group"><label>Total Harga (Rp)</label><input type="text" inputmode="numeric" id="editTotalPrice" oninput="this.value=fmtInputPrice(this.value)"></div>
      <div class="form-group"><label>DP Dibayar (Rp)</label><input type="text" inputmode="numeric" id="editDeposit" oninput="this.value=fmtInputPrice(this.value)"></div>
    </div>
    <div class="form-group"><label>Varian / Spesifikasi</label><input type="text" id="editVarian" placeholder="Contoh: Bordir 3D benang emas"></div>
    <div class="form-group" style="margin-bottom:20px"><label>Catatan</label><textarea id="editNotes" rows="3"></textarea></div>
    <div id="editSizeCard" style="display:none;margin-bottom:20px">
      <label style="font-size:12px;font-weight:700;color:rgba(3,69,67,.6);display:block;margin-bottom:8px">Rincian Ukuran</label>
      <div id="editSizeGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px"></div>
      <p id="editSizeTotalInfo" style="display:none;font-size:11px;color:rgba(3,69,67,.5);margin-top:6px">Total: <b id="editSizeTotalVal"></b></p>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="closeEditModal()" class="btn btn-ghost" style="flex:1;justify-content:center">Batal</button>
      <button onclick="submitEdit()" class="btn btn-primary" style="flex:1;justify-content:center" id="editSubmitBtn">Simpan Perubahan</button>
    </div>
  </div>
</div>

</div>

<script type="module">
  import { db, storage } from './js/config.js'
  import { requireAuth, getProfile, dataAuthReady, hasProductionAccess } from './js/auth.js'
  import { doc, getDoc, updateDoc, addDoc, collection, query, orderBy, getDocs, Timestamp, deleteDoc, setDoc, onSnapshot, arrayUnion, arrayRemove, deleteField, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'
  import { ref, uploadBytesResumable, getDownloadURL, deleteObject } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js'
  import { DIVISION_META, STATUS_LABEL, STATUS_CLASS, fmtCurrency, fmtDate, paymentStatus, timeAgo, hasContactInfo, detectSuspiciousMsg, generateChatToken } from './js/utils.js'
  import { attachMentionAutocomplete, loadStaff, parseMentions, writeMentionNotifs, highlightMentions } from './js/mentions.js'

  const params = new URLSearchParams(location.search)
  const orderId = params.get('id')
  if (!orderId) { location.href = 'orders.html' }

  const WORKER_URL = 'https://harmoni-order-api.adhiitmuh.workers.dev'
  const NOTIFY_KEY = ''

  // Notifikasi WA otomatis ke customer via Worker
  function notifyCustomer(type, extra = {}) {
    if (!order?.customerContact || !WORKER_URL) return
    fetch(`${WORKER_URL}/notify-customer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Notify-Key': NOTIFY_KEY },
      body: JSON.stringify({
        orderId,
        customerContact: order.customerContact,
        customerName: order.customerName,
        orderNumber: order.orderNumber,
        chatToken: order.chatToken || null,
        lokasiNama: order.lokasiNama || order.branch || '',
        type,
        ...extra,
      }),
    }).catch(() => {})
  }

  // Tombol manual — bypass cooldown, force-send notif
  window.notifyCustomerManual = async function() {
    const btn = document.getElementById('notifCustomerBtn')
    if (!btn || !WORKER_URL) return
    const orig = btn.innerHTML
    btn.disabled = true; btn.innerHTML = '⏳'
    try {
      await fetch(`${WORKER_URL}/notify-customer`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Notify-Key': NOTIFY_KEY },
        body: JSON.stringify({
          orderId,
          customerContact: order.customerContact,
          customerName: order.customerName,
          orderNumber: order.orderNumber,
          chatToken: order.chatToken || null,
          lokasiNama: order.lokasiNama || order.branch || '',
          type: 'manual',
        }),
      })
      btn.innerHTML = '✅ Terkirim'
      setTimeout(() => { btn.disabled = false; btn.innerHTML = orig }, 3000)
    } catch {
      btn.disabled = false; btn.innerHTML = orig
      alert('Gagal mengirim notifikasi. Coba lagi.')
    }
  }

  function fmtPrice(n) {
    const num = Number(String(n||'').replace(/\./g,''))
    return num > 0 ? num.toLocaleString('id-ID') : ''
  }
  window.fmtInputPrice = function(val) {
    const digits = String(val).replace(/\D/g,'')
    return digits ? Number(digits).toLocaleString('id-ID') : ''
  }
  function parsePrice(val) {
    return Number(String(val||'').replace(/\./g,'').replace(/[^\d]/g,''))||0
  }

  let order = null
  let paymentInfo = null
  let staffList = []

  async function loadPaymentInfo() {
    try {
      await dataAuthReady
      const snap = await getDoc(doc(db,'settings','payment_info'))
      if (snap.exists()) paymentInfo = snap.data()
    } catch(e) { /* ignore */ }
  }

  requireAuth((profile) => {
    loadPaymentInfo()
    loadStaff().then(l => { staffList = l }).catch(() => {})
    // Timeout fallback — kalau 10 detik masih loading, minta refresh
    const loadTimeout = setTimeout(() => {
      const el = document.getElementById('pageContent')
      if (el && el.querySelector('.loading')) {
        el.innerHTML = `<div style="text-align:center;padding:60px 20px"><div style="font-size:40px">⚠️</div><p style="margin-top:12px;color:rgba(3,69,67,.5)">Koneksi lambat atau perlu refresh.<br><a href="" onclick="location.reload();return false" style="color:var(--green);font-weight:600">↻ Refresh halaman</a></p></div>`
      }
    }, 10000)
    loadOrder(profile, loadTimeout)
  })

  async function loadOrder(profile, loadTimeout) {
    try {
    await dataAuthReady
    const snap = await getDoc(doc(db,'orders',orderId))
    if (!snap.exists()) { document.getElementById('pageContent').innerHTML = '<p>Order tidak ditemukan</p>'; return }
    order = { id: snap.id, ...snap.data() }

    // Cabang guard — non-owner hanya bisa akses order dari cabang mereka
    if (profile.role !== 'owner' && order.branch && profile.branch && order.branch !== profile.branch) {
      document.getElementById('pageContent').innerHTML = `
        <div style="text-align:center;padding:60px 20px">
          <div style="font-size:40px;margin-bottom:12px">🔒</div>
          <div style="font-weight:700;font-size:16px;margin-bottom:6px">Akses Ditolak</div>
          <div style="font-size:13px;color:rgba(3,69,67,.5);margin-bottom:20px">Order ini milik cabang lain</div>
          <a href="orders.html" class="btn btn-ghost btn-sm">← Kembali</a>
        </div>`
      return
    }

    const updSnap = await getDocs(query(collection(db,'orders',orderId,'progress_updates'), orderBy('createdAt','desc')))
    order.progressUpdates = updSnap.docs.map(d => ({ id: d.id, ...d.data() }))

    clearTimeout(loadTimeout)
    renderPage(profile)
    // Attach mention autocomplete to internal chat textarea (programmatic, not via oninput attr)
    ;(function() {
      const ta = document.getElementById('internalChatInput')
      if (!ta || ta._mcReady) return
      ta._mcReady = true
      const doAttach = () => attachMentionAutocomplete(ta, staffList)
      if (staffList.length) { doAttach() }
      else { loadStaff().then(l => { staffList = l; doAttach() }).catch(() => {}) }
    })()
    if (chatUnsub) chatUnsub()
    if (internalChatUnsub) internalChatUnsub()
    setTimeout(() => { initChat(); initInternalChat() }, 200)
    } catch(err) {
      clearTimeout(loadTimeout)
      document.getElementById('pageContent').innerHTML = `<div style="text-align:center;padding:60px 20px"><div style="font-size:40px">⚠️</div><p style="margin-top:12px;color:rgba(3,69,67,.5)">Gagal memuat order: ${err.message}</p><a href="orders.html" class="btn btn-ghost btn-sm" style="margin-top:12px">← Kembali</a></div>`
    }
  }

  function renderPage(profile) {
    const meta = DIVISION_META[order.division] || {}
    const showContact  = profile.role === 'owner'
    const canEdit        = profile.role === 'owner' || profile.role === 'cs'
    const canEditLokasi  = profile.role === 'owner' || profile.role === 'data'
    const canEditItemPrice = profile.role === 'owner' || profile.role === 'manager'
    const canEditModal   = profile.role === 'owner'
    const canSubmitModal = profile.role === 'data'
    const canSeeModal    = canEditModal || canSubmitModal
    const sisa = (order.totalPrice||0) - (order.depositPaid||0)
    const pStatus = paymentStatus(order.totalPrice, order.depositPaid)
    const isPaid = sisa <= 0 && (order.totalPrice||0) > 0

    document.title = `${order.orderNumber} — Harmoni`

    document.getElementById('pageContent').innerHTML = `
      <!-- Header -->
      <div class="no-print" style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:12px">
          <a href="orders.html" style="color:rgba(3,69,67,.4);font-size:13px;text-decoration:none">← Kembali</a>
          <span style="color:rgba(3,69,67,.2)">|</span>
          <span style="font-size:24px">${meta.icon||'📦'}</span>
          <div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span class="mono" style="font-size:12px;color:rgba(3,69,67,.4)">${order.orderNumber}</span>
              <span class="badge ${STATUS_CLASS[order.status]}">${STATUS_LABEL[order.status]}</span>
            </div>
            <h1 style="font-size:20px;font-weight:800;color:var(--black)">${order.customerName}</h1>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap" class="no-print">
          ${profile.role === 'owner' ? `<button onclick="deleteOrder()" class="btn btn-danger btn-sm">🗑 Hapus</button>` : ''}
          ${(profile.role === 'cs' || profile.role === 'owner') && !['cancelled','delivered'].includes(order.status) ? `
            <button onclick="requestEdit()" class="btn btn-ghost btn-sm">✏️ Edit</button>
            <button onclick="requestVoid()" class="btn btn-danger btn-sm">🚫 Void</button>
          ` : ''}
          <button onclick="showInvoice()" class="btn btn-primary">📄 Invoice</button>
        </div>
      </div>

      <!-- Price approval banner -->
      ${order.priceApprovalStatus === 'pending' ? `
      <div style="background:${order.priceApprovalTier==='admin'?'#fff1f2':'#fffbeb'};border:1.5px solid ${order.priceApprovalTier==='admin'?'#fecdd3':'#fde68a'};border-radius:12px;padding:14px 18px;margin-bottom:20px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div>
            <div style="font-weight:700;font-size:14px;color:${order.priceApprovalTier==='admin'?'#b91c1c':'#d97706'}">
              ${order.priceApprovalTier==='admin'?'🔒 Menunggu Approval Owner':'⚠ Menunggu Approval Kepala Cabang'}
            </div>
            <div style="font-size:12px;color:rgba(3,69,67,.6);margin-top:3px">
              Alasan diskon: <em>${order.priceApprovalReason||'—'}</em>
            </div>
            <div style="font-size:11px;color:rgba(3,69,67,.45);margin-top:2px">
              ${order.priceApprovalTier==='admin'?'Hanya Owner yang dapat menyetujui harga ini':'Hanya Kepala Cabang atau Owner yang dapat menyetujui'}
            </div>
          </div>
          ${(order.priceApprovalTier==='promo' && (profile.role==='manager'||profile.role==='owner')) ||
            (order.priceApprovalTier==='admin' && profile.role==='owner') ? `
          <div style="display:flex;gap:8px;flex-shrink:0">
            <button onclick="rejectPrice()" class="btn btn-danger btn-sm">✕ Tolak</button>
            <button onclick="approvePrice()" class="btn btn-green btn-sm" id="approvePriceBtn">✓ Setujui Harga</button>
          </div>` : ''}
        </div>
      </div>` : ''}
      ${order.priceApprovalStatus === 'rejected' ? `
      <div style="background:#fee2e2;border:1.5px solid #fca5a5;border-radius:12px;padding:14px 18px;margin-bottom:20px">
        <div style="font-weight:700;font-size:14px;color:#b91c1c">❌ Harga Ditolak</div>
        <div style="font-size:12px;color:rgba(3,69,67,.6);margin-top:3px">Alasan: ${order.priceApprovalReason||'—'}</div>
        ${canEdit?`<a href="new-order.html" class="btn btn-ghost btn-sm" style="margin-top:8px;display:inline-flex">Buat Order Baru</a>`:''}
      </div>` : ''}

      ${order.status === 'draft' ? `
      <div style="background:#f8fafc;border:1.5px solid #cbd5e1;border-radius:12px;padding:14px 18px;margin-bottom:20px">
        <div style="font-weight:700;font-size:14px;color:#475569">⏳ Draft — Menunggu Pembayaran</div>
        <div style="font-size:12px;color:rgba(3,69,67,.6);margin-top:3px">
          Order belum dikonfirmasi. Target selesai akan otomatis bergeser saat DP pertama masuk.
        </div>
        ${order.originalDueDate ? `<div style="font-size:11px;color:rgba(3,69,67,.45);margin-top:2px">Target awal: ${fmtDate(order.originalDueDate)}</div>` : ''}
      </div>` : ''}

      <div style="display:grid;grid-template-columns:1fr 300px;gap:20px" class="no-print">
        <!-- Left -->
        <div>
          <!-- Order info -->
          <div class="card" style="margin-bottom:16px">
            <h2 style="font-size:14px;font-weight:700;margin-bottom:14px">Detail Order</h2>
            <div class="grid-2" style="gap:14px;font-size:13px">
              <div><p style="font-size:11px;color:rgba(3,69,67,.45);margin-bottom:2px">Divisi</p><p style="font-weight:600">${meta.label||''}</p></div>
              <div><p style="font-size:11px;color:rgba(3,69,67,.45);margin-bottom:2px">Tanggal Pesan</p><p style="font-weight:600">${fmtDate(order.orderDate)}</p></div>
              <div><p style="font-size:11px;color:rgba(3,69,67,.45);margin-bottom:2px">Target Selesai</p><p style="font-weight:600">${fmtDate(order.dueDate)}</p>${order.originalDueDate && order.originalDueDate !== order.dueDate ? `<p style="font-size:11px;color:rgba(3,69,67,.4);text-decoration:line-through">Awal: ${fmtDate(order.originalDueDate)}</p>` : ''}</div>
              ${showContact ? `<div><p style="font-size:11px;color:rgba(3,69,67,.45);margin-bottom:2px">Kontak</p><p style="font-weight:600;font-family:monospace">${order.customerContact||'-'}</p></div>` : ''}
              <div>
                <p style="font-size:11px;color:rgba(3,69,67,.45);margin-bottom:2px">Lokasi Harmoni</p>
                <div style="display:flex;align-items:center;gap:6px">
                  <span style="font-weight:600;flex:1" id="lokasiDisplay">${order.lokasiNama || order.branch || '—'}</span>
                  ${canEditLokasi ? `<button onclick="editLokasi()" class="btn btn-ghost btn-sm" style="padding:2px 8px;font-size:11px" id="lokasiEditBtn">Edit</button>` : ''}
                </div>
                ${canEditLokasi ? `
                <div id="lokasiEditWrap" style="display:none;margin-top:6px">
                  <select id="lokasiSelect" style="font-size:13px;width:100%;padding:6px 8px;border:1.5px solid rgba(3,69,67,.2);border-radius:8px;outline:none;background:white">
                    <option value="">Memuat…</option>
                  </select>
                  <div style="display:flex;gap:6px;margin-top:6px">
                    <button onclick="cancelLokasi()" class="btn btn-ghost btn-sm" style="flex:1;justify-content:center;font-size:12px">Batal</button>
                    <button onclick="saveLokasi()" class="btn btn-primary btn-sm" style="flex:1;justify-content:center;font-size:12px" id="lokasiSaveBtn">Simpan</button>
                  </div>
                </div>` : ''}
              </div>
            </div>
            ${order.sizeBreakdown && Object.keys(order.sizeBreakdown).length ? `
              <hr class="sep">
              <p style="font-size:11px;color:rgba(3,69,67,.45);margin-bottom:8px">Rincian Ukuran</p>
              <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px">
                ${Object.entries(order.sizeBreakdown).map(([s,q]) => `
                  <div style="text-align:center;padding:6px 12px;background:rgba(3,69,67,.06);border-radius:8px;min-width:52px">
                    <div style="font-size:10px;font-weight:700;color:rgba(3,69,67,.45)">${s}</div>
                    <div style="font-size:16px;font-weight:800;color:var(--green)">${q}</div>
                  </div>`).join('')}
                <div style="text-align:center;padding:6px 12px;background:#034543;border-radius:8px;min-width:52px">
                  <div style="font-size:10px;font-weight:700;color:rgba(255,251,213,.55)">TOTAL</div>
                  <div style="font-size:16px;font-weight:800;color:#FFFBD5">${Object.values(order.sizeBreakdown).reduce((a,b)=>a+b,0)}</div>
                </div>
              </div>` : ''}
            ${order.varian ? `<hr class="sep"><p style="font-size:11px;color:rgba(3,69,67,.45);margin-bottom:4px">Varian / Spesifikasi</p><p style="font-size:13px;font-weight:600">${order.varian}</p>` : ''}
            ${order.notes ? `<hr class="sep"><p style="font-size:11px;color:rgba(3,69,67,.45);margin-bottom:4px">Catatan</p><p style="font-size:13px;white-space:pre-wrap">${order.notes}</p>` : ''}
          </div>

          <!-- Ukuran -->
          ${['tailor','butik','jilbab','jersey','konveksi','sewa-kostum'].includes(order.division) ? `
          <div class="card" style="margin-bottom:16px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
              <h2 style="font-size:14px;font-weight:700">📐 Ukuran</h2>
              ${canEdit ? `<button onclick="toggleUkuran()" class="btn btn-ghost btn-sm" id="ukuranEditBtn">Edit</button>` : ''}
            </div>
            <div id="ukuranView">
              ${order.measurements && Object.keys(order.measurements).length ? `
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px">
                  ${Object.entries(order.measurements).filter(([,v])=>v).map(([k,v])=>`
                    <div><p style="font-size:10px;color:rgba(3,69,67,.45);margin-bottom:1px">${k}</p><p style="font-weight:600">${v}</p></div>`).join('')}
                </div>` : '<p style="font-size:13px;color:rgba(3,69,67,.35)">Belum ada data ukuran</p>'}
            </div>
            <div id="ukuranEdit" style="display:none">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="ukuranFields"></div>
              <button onclick="saveUkuran()" class="btn btn-primary btn-sm" style="margin-top:10px;width:100%;justify-content:center" id="saveUkuranBtn">Simpan Ukuran</button>
            </div>
          </div>` : ''}

          <!-- Files -->
          <div class="card" style="margin-bottom:16px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
              <h2 style="font-size:14px;font-weight:700;margin:0">File Desain</h2>
              ${(canEdit || hasProductionAccess(profile, order.division)) ? `
              <label style="cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--green);padding:5px 10px;border:1.5px solid rgba(3,69,67,.15);border-radius:8px">
                + Tambah Foto
                <input type="file" accept="image/*,.pdf" multiple style="display:none" onchange="addDesignFiles(this)">
              </label>` : ''}
            </div>
            <div id="designFilesProgress" style="display:none;font-size:12px;color:var(--green);margin-bottom:8px">⏳ Mengupload foto desain…</div>
            ${order.designFiles?.length ? `
            <div style="display:flex;flex-wrap:wrap;gap:8px">
              ${order.designFiles.map((f,i) => {
                const isImg = /\.(jpg|jpeg|png|gif|webp)/i.test(f)
                return isImg

  function renderPaymentInfoBlock(order, sisa, isPaid) {
    if (isPaid || sisa <= 0) return ''
    if (!paymentInfo) return ''

    const method = order.paymentMethod

    // Kalau metode spesifik dipilih, tampilkan hanya metode itu
    if (method === 'cash') {
      return `<div style="background:var(--beige-soft);border-radius:12px;padding:14px 18px;margin-bottom:18px">
        <p style="font-size:10px;color:rgba(3,69,67,.4);letter-spacing:.06em;margin-bottom:8px">PEMBAYARAN</p>
        <div style="font-size:13px;font-weight:700">💵 Tunai / Cash</div>
        <div style="font-size:12px;color:rgba(3,69,67,.5);margin-top:4px">Pembayaran dilakukan secara tunai di toko</div>
      </div>`
    }

    if (method && method.startsWith('transfer_')) {
      const banks = paymentInfo.banks || []
      const bankName = method.replace('transfer_','')
      const byName = b => b.bankName.toLowerCase().replace(/\s+/g,'_') === bankName
      const divMatch = b => { const d = Array.isArray(b.divisions)?b.divisions:(b.division?[b.division]:[]); return !d.length||d.includes(order.division) }
      const locMatch = b => { const l = Array.isArray(b.lokasiIds)?b.lokasiIds:[]; return !l.length||l.includes(order.lokasiId) }
      const bank = banks.find(b => byName(b) && divMatch(b) && locMatch(b))
                 || banks.find(b => byName(b) && divMatch(b))
                 || banks.find(b => byName(b) && locMatch(b))
                 || banks.find(b => byName(b))
      if (!bank) return ''
      return `<div style="background:var(--beige-soft);border-radius:12px;padding:14px 18px;margin-bottom:18px">
        <p style="font-size:10px;color:rgba(3,69,67,.4);letter-spacing:.06em;margin-bottom:8px">TRANSFER BANK</p>
        <div style="font-size:15px;font-weight:800;color:var(--green)">${bank.bankName}</div>
        <div style="font-family:monospace;font-size:18px;font-weight:700;letter-spacing:.04em;margin-top:4px">${bank.accountNumber}</div>
        <div style="font-size:12px;color:rgba(3,69,67,.5);margin-top:4px">a.n. ${bank.accountHolder}</div>
      </div>`
    }

    // Kalau belum dipilih metode (atau QRIS) — tampilkan semua opsi pembayaran aktif
    // Filter bank: tampilkan bank khusus divisi ini + bank universal (tanpa divisi)
    // Bank khusus divisi lain tidak ditampilkan
    const bankMatchesOrder = b => {
      const divs = Array.isArray(b.divisions) ? b.divisions : (b.division ? [b.division] : [])
      const locs = Array.isArray(b.lokasiIds) ? b.lokasiIds : []
      return (!divs.length || divs.includes(order.division)) && (!locs.length || locs.includes(order.lokasiId))
    }
    const allActiveBanks = (paymentInfo.banks || []).filter(b => b.isActive !== false)
    const activeBanks = allActiveBanks.filter(bankMatchesOrder)
    const activeQris = (paymentInfo.qris || []).filter(q => q.isActive !== false && (!q.division || q.division === order.division))
    // Legacy single QRIS
    const legacyQris = (!paymentInfo.qris?.length && paymentInfo.qrisActive && paymentInfo.qrisImageUrl)
      ? [{ imageUrl: paymentInfo.qrisImageUrl }] : []
    const allQris = activeQris.length ? activeQris : legacyQris

    if (!activeBanks.length && !allQris.length && !paymentInfo.cashActive) return ''

    let html = `<div style="background:var(--beige-soft);border-radius:12px;padding:14px 18px;margin-bottom:18px">
      <p style="font-size:10px;color:rgba(3,69,67,.4);letter-spacing:.06em;margin-bottom:12px">CARA PEMBAYARAN</p>`

    if (activeBanks.length) {
      html += `<p style="font-size:11px;font-weight:700;color:rgba(3,69,67,.5);margin-bottom:8px">Transfer Bank</p>`
      html += activeBanks.map(b => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(3,69,67,.08)">
          <div>
            <div style="font-weight:800;font-size:14px;color:var(--green)">${b.bankName}</div>
            <div style="font-size:11px;color:rgba(3,69,67,.5)">a.n. ${b.accountHolder}</div>
          </div>
          <div style="font-family:monospace;font-size:15px;font-weight:700;letter-spacing:.04em">${b.accountNumber}</div>
        </div>`).join('')
    }

    if (allQris.length) {
      html += `<p style="font-size:11px;font-weight:700;color:rgba(3,69,67,.5);margin:${activeBanks.length?'12px':'0'}px 0 8px">QRIS</p>`
      html += allQris.map(q => `
        <div style="text-align:center;margin-bottom:6px">
          <img src="${q.imageUrl}" alt="QRIS" style="max-width:160px;border-radius:8px;border:1px solid rgba(3,69,67,.1)">
          <p style="font-size:10px;color:rgba(3,69,67,.5);margin-top:4px">Scan dengan dompet digital atau m-banking</p>
        </div>`).join('')
    }

    if (paymentInfo.cashActive !== false && !activeBanks.length && !allQris.length) {
      html += `<div style="font-size:13px;font-weight:700">💵 Tunai / Cash di toko</div>`
    }

    html += `</div>`
    return html
  }

          ${order.sizeBreakdown && Object.keys(order.sizeBreakdown).length ? `

  // ── PIN Approval ──────────────────────────────────────────
  let pinAction = null  // 'edit' | 'void'
  let managers = []

  async function loadManagers() {
    if (managers.length) return
    const snap = await getDocs(query(collection(db,'users')))
    managers = snap.docs.map(d => ({id:d.id,...d.data()})).filter(u => u.role === 'manager' && u.pin)
  }

  async function openPinModal(action) {
    await loadManagers()
    if (!managers.length) { alert('Belum ada Kepala Cabang dengan PIN. Minta Owner tambahkan PIN di Kelola Pengguna.'); return }
    pinAction = action
    const sel = document.getElementById('pinManagerSelect')
    sel.innerHTML = managers.map(m => `<option value="${m.id}">${m.name}${m.branch ? ' — ' + m.branch : ''}</option>`).join('')
    document.getElementById('pinInput').value = ''
    document.getElementById('pinError').style.display = 'none'
    document.getElementById('pinModalTitle').textContent = action === 'edit' ? '✏️ Approval Edit Order' : '🚫 Approval Void Order'
    document.getElementById('pinModalDesc').textContent = action === 'edit'
      ? `Edit data order ${order.orderNumber} memerlukan persetujuan Kepala Cabang.`
      : `Void order ${order.orderNumber} akan membatalkan pesanan ini. Tindakan ini memerlukan persetujuan Kepala Cabang.`
    document.getElementById('pinModal').style.display = 'flex'
    setTimeout(() => document.getElementById('pinInput').focus(), 100)
  }

  window.closePinModal = function() {
    document.getElementById('pinModal').style.display = 'none'
    pinAction = null
  }

  window.confirmPin = async function() {
    const managerId = document.getElementById('pinManagerSelect').value
    const pin = document.getElementById('pinInput').value.trim()
    const manager = managers.find(m => m.id === managerId)
    const errEl = document.getElementById('pinError')
    const btn = document.getElementById('pinConfirmBtn')

    if (!pin) { errEl.textContent = 'Masukkan PIN'; errEl.style.display = ''; return }
    if (!manager || manager.pin !== pin) {
      errEl.textContent = 'PIN salah, coba lagi'; errEl.style.display = ''
      document.getElementById('pinInput').value = ''
      document.getElementById('pinInput').focus()
      return
    }

    errEl.style.display = 'none'
    btn.disabled = true; btn.textContent = 'Memproses…'
    document.getElementById('pinModal').style.display = 'none'

    if (pinAction === 'edit') openEditModal(manager)
    else if (pinAction === 'void') executeVoid(manager)

    pinAction = null
    btn.disabled = false; btn.textContent = 'Konfirmasi'
  }

  window.requestEdit = function() {
    const profile = getProfile()
    if (profile.role === 'owner') { openEditModal(null); return }
    if (profile.role === 'manager') { openEditModal(profile); return }
    openPinModal('edit')
  }

  window.requestVoid = function() {
    const profile = getProfile()
    if (profile.role === 'owner') { executeVoid(null); return }
    if (profile.role === 'manager') { executeVoid(profile); return }
    openPinModal('void')
  }

  window.closeEditModal = function() {
    document.getElementById('editModal').style.display = 'none'
  }

  window.submitEdit = async function() {
    const btn = document.getElementById('editSubmitBtn')
    btn.disabled = true; btn.textContent = 'Menyimpan…'
    try {
      const profile = getProfile()
      const approvedByRaw = document.getElementById('editModal').dataset.approvedBy
      const approvedBy = approvedByRaw ? JSON.parse(approvedByRaw) : null
      const now = Timestamp.now()
      const editUpdates = {
        customerName: document.getElementById('editName').value.trim(),
        dueDate: document.getElementById('editDueDate').value,
        totalPrice: parsePrice(document.getElementById('editTotalPrice').value),
        depositPaid: parsePrice(document.getElementById('editDeposit').value),
        varian: document.getElementById('editVarian').value.trim() || null,
        notes: document.getElementById('editNotes').value.trim(),
        updatedAt: now,
        lastEditBy: profile.name,
        lastEditApprovedBy: approvedBy?.name || 'Owner',
        lastEditAt: now,
      }
      if (EDIT_SIZE_DIVISIONS.includes(order.division)) {
        const bd = {}
        EDIT_SIZES.forEach(s => { const v = Number(document.getElementById('editSize_'+s)?.value)||0; if(v>0) bd[s]=v })
        editUpdates.sizeBreakdown = Object.keys(bd).length ? bd : null
      }
      await updateDoc(doc(db,'orders',orderId), editUpdates)
      document.getElementById('editModal').style.display = 'none'
      await loadOrder(profile)
    } catch(err) { alert('Gagal menyimpan: ' + err.message) }
    finally { btn.disabled = false; btn.textContent = 'Simpan Perubahan' }
  }

  // ── Void Order ────────────────────────────────────────────
  async function executeVoid(approvedBy) {
    const profile = getProfile()
    if (!confirm(`Void order ${order.orderNumber}?\nStatus akan diubah ke Dibatalkan.`)) return
    try {
      const now = Timestamp.now()
      await updateDoc(doc(db,'orders',orderId), {
        status: 'cancelled',
        updatedAt: now,
        voidBy: profile.name,
        voidApprovedBy: approvedBy?.name || 'Owner',
        voidAt: now,
      })
      if (order.chatToken) {
        await updateDoc(doc(db,'public_order_info',order.chatToken), { status: 'cancelled' }).catch(()=>{})
      }
      await loadOrder(profile)
    } catch(err) { alert('Gagal void: ' + err.message) }
  }

  window.submitSupplierAssign = async function() {
    const profile = getProfile()
    const newAssignments = []
    let hasSelection = false

    ;(order.orderItems||[]).forEach((it, i) => {
      const sel = document.getElementById(`supSel-${i}`)
      if (!sel || !sel.value) return
      const supplier = _supplierList.find(s => s.id === sel.value)
      if (!supplier) return
      hasSelection = true
      const existing = (order.supplierAssignments||[]).find(a => a.itemIndex === i)
      if (!existing || existing.supplierId !== supplier.id) {
        newAssignments.push({
          itemIndex: i,
          supplierId: supplier.id,
          supplierNama: supplier.nama,
          assignStatus: 'pending_approval',
          assignedBy: profile.id,
          assignedByName: profile.name,
          assignedAt: Timestamp.now(),
          supplierToken: null,
        })
      }
    })

    if (!hasSelection) { alert('Pilih minimal satu supplier dulu.'); return }

    const merged = [...(order.supplierAssignments||[]).filter(a => !newAssignments.find(n => n.itemIndex === a.itemIndex)), ...newAssignments]
    await updateDoc(doc(db, 'orders', orderId), { supplierAssignments: merged, updatedAt: Timestamp.now() })
    order.supplierAssignments = merged
    await loadSupplierAssignUI()
  }

  window.approveSupplierAssign = async function(itemIndex) {
    const profile = getProfile()
    const asgn = (order.supplierAssignments||[]).find(a => a.itemIndex === itemIndex)
    if (!asgn) return

    const token = 'sup_' + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2)
    const divMeta = DIVISION_META[order.division]

    await setDoc(doc(db, 'supplier_tokens', token), {
      orderId,
      orderCode: order.orderNumber ? order.orderNumber.replace(/HRM-[A-Z]+-\d+-/, 'ORD-') : 'ORD-' + orderId.slice(-6).toUpperCase(),
      supplierId: asgn.supplierId,
      supplierNama: asgn.supplierNama,
      divisiLabel: divMeta?.label || order.division,
      itemIndexes: [itemIndex],
      createdBy: profile.id,
      createdAt: Timestamp.now(),
    })

    const updated = (order.supplierAssignments||[]).map(a => a.itemIndex === itemIndex
      ? { ...a, assignStatus: 'approved', supplierToken: token, approvedBy: profile.id, approvedByName: profile.name, approvedAt: Timestamp.now() }
      : a
    )
    await updateDoc(doc(db, 'orders', orderId), { supplierAssignments: updated, updatedAt: Timestamp.now() })
    order.supplierAssignments = updated
    await loadSupplierAssignUI()
  }

  window.shareSupplierLink = function(token, supplierNama) {
    const url = `${location.origin}${location.pathname.replace('order.html','supplier-view.html')}?t=${token}`
    const supplier = _supplierList.find(s => s.nama === supplierNama)
    const kontak = supplier?.kontak?.replace(/\D/g,'').replace(/^0/,'62') || ''
    const msg = `Halo *${supplierNama}*,\n\nBerikut link detail pesanan dari *Harmoni Indonesia* untuk Anda kerjakan:\n\n${url}\n\nMelalui link ini Anda bisa:\n✅ Lihat detail pesanan & file desain\n✅ Update progress pengerjaan\n\nTerima kasih 🙏\n_Harmoni Indonesia_`
    const waUrl = kontak.startsWith('62')
      ? `https://wa.me/${kontak}?text=${encodeURIComponent(msg)}`
      : `https://wa.me/?text=${encodeURIComponent(msg)}`
    window.open(waUrl, '_blank')
  }

  window.saveProgress = async function() {
    const note = document.getElementById('progressNote').value.trim()
    const pct = Number(document.getElementById('progressRange').value)
    if (!note) return
    const btn = document.getElementById('saveProgressBtn')
    btn.disabled = true; btn.textContent = 'Menyimpan…'
    try {
      const profile = getProfile()
      const now = Timestamp.now()
      // Upload foto jika ada
      const files = document.getElementById('progressFiles')?.files || []
      const photos = []
      for (const f of files) {
        const storRef = ref(storage, `orders/${orderId}/progress/${Date.now()}_${f.name}`)
        const snap = await new Promise((res, rej) => {
          const task = uploadBytesResumable(storRef, f)
          task.on('state_changed', null, rej, () => res(task.snapshot))
        })
        photos.push(await getDownloadURL(snap.ref))
      }
      await addDoc(collection(db,'orders',orderId,'progress_updates'), {
        note, percentage: pct, photos,
        updatedBy: profile.id,
        updatedByName: profile.name,
        createdAt: now,
      })
      await updateDoc(doc(db,'orders',orderId), {
        progressPercentage: pct,
        status: pct===100 ? 'done' : (pct>0 && order.status==='pending' ? 'in-progress' : order.status),
        updatedAt: now,
      })
      // Kirim progress ke chat customer + update public info
      if (order.chatToken) {
        addDoc(collection(db,'chat_messages',order.chatToken,'messages'), {
          type:'progress', percentage:pct, note, photos,
          senderName: profile.name, senderRole: profile.role,
          createdAt: now,
        }).catch(() => {})
        updateDoc(doc(db,'public_order_info',order.chatToken), { progressPercentage: pct }).catch(() => {})

  async function compressImage(file) {
    if (!file.type.startsWith('image/')) return file
    return new Promise(resolve => {
      const img = new Image()
      const url = URL.createObjectURL(file)
      img.onload = () => {
        URL.revokeObjectURL(url)
        let { width, height } = img
        const MAX = 1920
        if (width <= MAX && height <= MAX) { resolve(file); return }
        if (width > height) { height = Math.round(height * MAX / width); width = MAX }
        else { width = Math.round(width * MAX / height); height = MAX }
        const canvas = document.createElement('canvas')
        canvas.width = width; canvas.height = height
        canvas.getContext('2d').drawImage(img, 0, 0, width, height)
        canvas.toBlob(blob => resolve(new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' })), 'image/jpeg', 0.85)
      }
      img.src = url
    })
  }

  function calcDraftShift() {
    const orderDate = new Date(order.orderDate || order.createdAt?.toDate?.() || order.createdAt)
    const today = new Date()
    today.setHours(0,0,0,0); orderDate.setHours(0,0,0,0)
    const delayDays = Math.round((today - orderDate) / 86400000)
    if (delayDays <= 0) return {}
    const origDue = new Date(order.originalDueDate || order.dueDate)
    origDue.setDate(origDue.getDate() + delayDays)
    const newDueDate = origDue.toISOString().split('T')[0]
    const newStatus = order.priceApprovalStatus === 'pending' ? 'pending-approval' : 'pending'
    return { dueDate: newDueDate, status: newStatus }
  }

    const inputs = document.querySelectorAll('#ukuranFields input[data-field]')
    const measurements = {}
    inputs.forEach(inp => { if (inp.value.trim()) measurements[inp.dataset.field] = inp.value.trim() })
    try {
      const now = Timestamp.now()
      await updateDoc(doc(db,'orders',orderId), { measurements, updatedAt: now, ukuranEditBy: getProfile().name, ukuranEditAt: now })
      await loadOrder(getProfile())
    } finally { btn.disabled=false; btn.textContent='Simpan Ukuran' }
  }

  window.editLokasi = async function() {
    const wrap = document.getElementById('lokasiEditWrap')
    if (!wrap) return
    wrap.style.display = ''
    const btn = document.getElementById('lokasiEditBtn')
    if (btn) btn.style.display = 'none'
    const sel = document.getElementById('lokasiSelect')
    if (sel.options.length > 1 && sel.options[0].value !== '') return
    try {
      await dataAuthReady
      const snap = await getDocs(query(collection(db, 'lokasi'), orderBy('nama')))
      sel.innerHTML = '<option value="">— Tidak ada / kosongkan —</option>'
      snap.docs.filter(d => d.data().aktif !== false).forEach(d => {
        const opt = document.createElement('option')
        opt.value = d.id
        opt.textContent = d.data().nama
        if (d.id === order.lokasiId) opt.selected = true
        sel.appendChild(opt)
      })
    } catch(e) {
      sel.innerHTML = `<option value="">Gagal memuat: ${e.message}</option>`
    }
  }

  window.cancelLokasi = function() {
    const wrap = document.getElementById('lokasiEditWrap')
    if (wrap) wrap.style.display = 'none'
    const btn = document.getElementById('lokasiEditBtn')
    if (btn) btn.style.display = ''
  }

  window.saveLokasi = async function() {
    const sel = document.getElementById('lokasiSelect')
    const lokasiId = sel.value || null
    const lokasiNama = lokasiId ? sel.options[sel.selectedIndex].textContent : null
    const btn = document.getElementById('lokasiSaveBtn')
    btn.disabled = true; btn.textContent = 'Menyimpan…'
    try {
      await updateDoc(doc(db, 'orders', orderId), {
        lokasiId,
        lokasiNama,
        updatedAt: Timestamp.now(),
      })
      await loadOrder(getProfile())
    } catch(e) {
      alert('Gagal simpan: ' + e.message)
      btn.disabled = false; btn.textContent = 'Simpan'
    }
  }

  window.showInvoice = function() {
    // Switch to invoice view for printing
    document.querySelectorAll('.no-print').forEach(el => el.style.display='none')
    document.querySelectorAll('.print-only').forEach(el => el.style.display='block')
    document.querySelector('.main').style.padding='0'
    document.querySelector('.main').style.marginLeft='0'
    document.getElementById('sidebar').style.display='none'
    // Add action bar
    const bar = document.createElement('div')
    bar.style.cssText='position:fixed;top:0;left:0;right:0;background:var(--beige-soft);padding:12px 20px;display:flex;gap:10px;z-index:999;border-bottom:1px solid rgba(3,69,67,.1)'
    bar.innerHTML=`
      <button onclick="backFromInvoice()" class="btn btn-ghost btn-sm">← Kembali</button>
      <div style="flex:1"></div>
      <button onclick="window.print()" class="btn btn-ghost btn-sm">🖨️ Print</button>
      <button onclick="sendWA()" class="btn" style="background:#25D366;color:white;border:none;font-size:13px;padding:8px 16px;border-radius:999px;font-weight:700;cursor:pointer">📱 WhatsApp</button>`
    document.body.prepend(bar)
    window.scrollTo(0,0)
  }

  // ===== CHAT =====
  let chatUnsub = null
  let internalChatUnsub = null

  function initChat() {
    if (!order.chatToken) return
    updateDoc(doc(db, 'orders', orderId), { unreadCustomerChat: 0 }).catch(() => {})
    const chatCol = collection(db, 'chat_messages', order.chatToken, 'messages')
    const chatQ = query(chatCol, orderBy('createdAt'))
    chatUnsub = onSnapshot(chatQ, (snap) => {
      const el = document.getElementById('chatMessages')
      if (!el) return
      if (snap.empty) {
        el.innerHTML = '<p style="font-size:13px;color:rgba(3,69,67,.35);text-align:center;padding:20px">Belum ada pesan. Mulai diskusi desain.</p>'
        return
      }
      const profile = getProfile()
      const msgs = snap.docs.map(d => d.data())

      el.innerHTML = msgs.map(m => {
        const isMe = m.senderId === profile?.id
        const isCustomer = m.senderRole === 'customer'
        const bg = isCustomer ? '#f0fdf4' : isMe ? 'var(--green)' : 'var(--beige-soft)'
        const color = isMe ? 'white' : 'var(--black)'
        const align = isMe ? 'flex-end' : 'flex-start'
        const staffLabel = m.senderBranch ? `${m.senderName} • ${m.senderBranch}` : m.senderName
        const name = isCustomer
          ? `👤 ${m.senderName}`
          : m.senderRole === 'production'
            ? `🎨 Tim Desain — ${staffLabel}`
            : `💬 CS Harmoni — ${staffLabel}`
        return `<div style="display:flex;flex-direction:column;align-items:${align};max-width:80%">
          <span style="font-size:10px;color:rgba(3,69,67,.4);margin-bottom:2px;${isMe?'text-align:right':''}">${name} · ${timeAgo(m.createdAt)}</span>
          <div style="background:${bg};color:${color};padding:8px 12px;border-radius:${isMe?'12px 12px 2px 12px':'12px 12px 12px 2px'};font-size:13px;line-height:1.5;word-break:break-word">
            ${m.type==='file'&&m.imageUrl
              ? `<a href="${m.imageUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(0,0,0,.08);border-radius:8px;text-decoration:none;font-size:12px;font-weight:600">📎 ${m.fileName||'File'}</a>`
              : m.imageUrl ? `<a href="${m.imageUrl}" target="_blank"><img src="${m.imageUrl}" style="max-width:200px;max-height:160px;border-radius:6px;display:block"></a>` : ''}
            ${m.text ? m.text.replace(/\n/g,'<br>') : ''}
          </div>
        </div>`
      }).join('')
      el.scrollTop = el.scrollHeight

      // Badge unread: hitung pesan customer setelah balasan staff terakhir
      let lastStaffIdx = -1
      for (let i = msgs.length - 1; i >= 0; i--) {
        if (msgs[i].senderRole !== 'customer') { lastStaffIdx = i; break }
      }
      const unread = msgs.slice(lastStaffIdx + 1).filter(m => m.senderRole === 'customer').length
      const badge = document.getElementById('chatUnread')
      if (badge) {
        badge.textContent = unread || ''
        badge.style.display = unread > 0 ? '' : 'none'
      }
    })
  }

  window.sendChatMsg = async function() {
    const input = document.getElementById('chatInput')
    const text = input.value.trim()
    if (!text || !order.chatToken) return

    const profile = getProfile()

    if (hasContactInfo(text)) {
      addDoc(collection(db,'chat_flags'), {
        chatToken: order.chatToken,
        orderId,
        orderNumber: order.orderNumber || '',
        staffId: profile.id,
        staffName: profile.name,
        staffRole: profile.role,
        messageText: text,
        flagReason: 'Percobaan kirim info kontak (diblokir sistem)',
        flagType: 'blocked',
        reviewed: false,
        createdAt: Timestamp.now(),
      }).catch(() => {})
      alert('⚠ Pesan mengandung informasi kontak yang tidak boleh dibagikan.\n\nHapus nomor HP, email, atau link kontak dari pesan Anda.')
      return
    }

    input.value = ''
    const { flagged, reason } = detectSuspiciousMsg(text)

    await addDoc(collection(db,'chat_messages',order.chatToken,'messages'), {
      text, imageUrl: null, type: 'text',
      senderId: profile.id,
      senderName: profile.name,
      senderRole: profile.role,
      senderBranch: profile.branch || '',
      createdAt: Timestamp.now(),
    })

    // Auto-notif customer via WA (Worker cek cooldown 4 jam sendiri)
    notifyCustomer('chat')

    if (flagged) {
      addDoc(collection(db,'chat_flags'), {
        chatToken: order.chatToken,
        orderId,
        orderNumber: order.orderNumber || '',
        staffId: profile.id,
        staffName: profile.name,
        staffRole: profile.role,
        messageText: text,
        flagReason: reason,
        flagType: 'suspicious',
        reviewed: false,
        createdAt: Timestamp.now(),
      }).catch(() => {})
    }
  }

  window.sendChatFile = async function(input) {
    if (!input.files[0] || !order.chatToken) return
    const rawFile = input.files[0]
    const isImage = rawFile.type.startsWith('image/')
    const file = await compressImage(rawFile)
    const profile = getProfile()
    const storRef = ref(storage, `chats/${order.chatToken}/${Date.now()}_${file.name}`)
    const snap = await new Promise((res,rej) => {
      const task = uploadBytesResumable(storRef, file)
      task.on('state_changed', null, rej, () => res(task.snapshot))
    })
    const fileUrl = await getDownloadURL(snap.ref)
    await addDoc(collection(db,'chat_messages',order.chatToken,'messages'), {
      text: '', imageUrl: fileUrl, type: isImage ? 'image' : 'file',
      fileName: rawFile.name,
      senderId: profile.id,
      senderName: profile.name,
      senderRole: profile.role,
      senderBranch: profile.branch || '',
      createdAt: Timestamp.now(),
    })
    input.value = ''
  }

  // ===== INTERNAL CHAT =====
  const ROLE_COLOR = {
    owner:      { bg: '#034543', text: '#FFFBD5', label: 'Owner' },
    manager:    { bg: '#6d28d9', text: '#ede9fe', label: 'Kepala Cabang' },
    cs:         { bg: '#0d9488', text: '#ccfbf1', label: 'CS' },
    production: { bg: '#1d4ed8', text: '#dbeafe', label: 'Tim Produksi' },
  }

  async function initInternalChat() {
    const profile = getProfile()
    if (profile) updateDoc(doc(db, 'orders', orderId), {
      [`lastReadInternalChat.${profile.id}`]: Timestamp.now(),
      [`lastReadInternalChatCount.${profile.id}`]: order.internalChatCount || 0,
    }).catch(() => {})
    const q = query(collection(db, 'orders', orderId, 'internal_chat'), orderBy('createdAt'))
    internalChatUnsub = onSnapshot(q, snap => {
      const el = document.getElementById('internalChatMessages')
      if (!el) return
      if (snap.empty) {
        el.innerHTML = '<p style="font-size:13px;color:rgba(3,69,67,.35);text-align:center;padding:20px">Belum ada pesan internal. Mulai diskusi tim.</p>'
        return
      }
      const profile = getProfile()
      el.innerHTML = snap.docs.map(d => {
        const m = d.data()
        const isMe = m.senderId === profile?.id
        const rc = ROLE_COLOR[m.senderRole] || ROLE_COLOR.cs
        const align = isMe ? 'flex-end' : 'flex-start'
        const bubbleBg = isMe ? rc.bg : '#fff'
        const bubbleColor = isMe ? rc.text : '#282828'
        const bubbleBorder = isMe ? 'none' : '1px solid rgba(3,69,67,.1)'
        const escaped = (m.content || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')
        const rendered = highlightMentions(escaped, staffList, profile?.id)
        const isMentioned = staffList.some(s => s.id === profile?.id && (m.content||'').includes('@'+s.name))
        const bubbleContent = m.imageUrl
          ? `<a href="${m.imageUrl}" target="_blank"><img src="${m.imageUrl}" style="max-width:200px;max-height:200px;border-radius:8px;display:block;object-fit:cover"></a>${m.content ? `<div style="margin-top:6px;font-size:12px">${escaped}</div>` : ''}`
          : rendered
        return `
          <div style="display:flex;flex-direction:column;align-items:${align}">
            <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px;${isMe ? 'flex-direction:row-reverse' : ''}">
              <span style="font-size:10px;font-weight:700;background:${rc.bg};color:${rc.text};padding:1px 6px;border-radius:999px">${rc.label}</span>
              <span style="font-size:11px;font-weight:600;color:var(--black)">${m.senderName || '—'}</span>
              <span style="font-size:10px;color:rgba(3,69,67,.35)">${timeAgo(m.createdAt)}</span>
            </div>
            <div class="${isMentioned ? 'bubble-mentioned' : ''}" style="background:${bubbleBg};color:${bubbleColor};border:${bubbleBorder};padding:${m.imageUrl ? '6px' : '9px 13px'};border-radius:${isMe ? '12px 12px 2px 12px' : '12px 12px 12px 2px'};font-size:13px;line-height:1.5;word-break:break-word;max-width:80%;box-shadow:0 1px 3px rgba(0,0,0,.05)">
              ${bubbleContent}
            </div>
          </div>`
      }).join('')
      el.scrollTop = el.scrollHeight
    })
  }

  let _internalPhotoFile = null

  window.selectInternalPhoto = function(input) {
    const file = input.files[0]
    if (!file) return
    _internalPhotoFile = file
    const preview = document.getElementById('internalPhotoPreview')
    document.getElementById('internalPhotoName').textContent = '📷 ' + file.name
    preview.style.display = 'flex'
    input.value = ''
  }

  window.cancelInternalPhoto = function() {
    _internalPhotoFile = null
    document.getElementById('internalPhotoPreview').style.display = 'none'
    document.getElementById('internalPhotoName').textContent = ''
  }

  window.sendInternalMsg = async function() {
    const input = document.getElementById('internalChatInput')
    const content = input?.value.trim()
    const file = _internalPhotoFile
    if (!content && !file) return
    const profile = getProfile()
    const staffList = await loadStaff().catch(() => [])
    const mentioned = parseMentions(content, staffList)

    input.value = ''
    input.style.height = 'auto'
    cancelInternalPhoto()

    let imageUrl = null
    if (file) {
      const path = `internal_chat/${orderId}/${Date.now()}_${file.name}`
      const storageRef = ref(storage, path)
      await new Promise((resolve, reject) => {
        const task = uploadBytesResumable(storageRef, file)
        task.on('state_changed', null, reject, async () => {
          imageUrl = await getDownloadURL(storageRef)
          resolve()
        })
      })
    }

    await addDoc(collection(db, 'orders', orderId, 'internal_chat'), {
      content: content || '',
      imageUrl: imageUrl || null,
      senderId:   profile.id,
      senderName: profile.name,
      senderRole: profile.role,
      mentions:   mentioned.map(s => ({ id: s.id, name: s.name })),
      createdAt:  Timestamp.now(),
    })
    updateDoc(doc(db, 'orders', orderId), {
      internalChatLastAt: Timestamp.now(),
      internalChatCount: increment(1),
      [`lastReadInternalChat.${profile.id}`]: Timestamp.now(),
      [`lastReadInternalChatCount.${profile.id}`]: increment(1),
    }).catch(() => {})

    if (mentioned.length) {
      writeMentionNotifs(mentioned, profile.id, profile.name, content, orderId, order.orderNumber).catch(() => {})
    } else {
      addDoc(collection(db, 'notifications'), {
        type:        'internal_chat',
        orderId,
        orderNumber: order.orderNumber || '',
        division:    order.division || '',
        lokasiId:    order.lokasiId || null,
        fromUid:     profile.id,
        fromName:    profile.name,
        fromRole:    profile.role,
        preview:     content ? content.substring(0, 80) : '📷 Foto',
        createdAt:   Timestamp.now(),
      }).catch(() => {})
    }
  }

  window.copyChatLink = function(token) {
    const url = `${location.origin}${location.pathname.replace('order.html','chat.html')}?t=${token}`
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('copyLinkBtn')
      btn.textContent = '✓ Tersalin!'
      setTimeout(() => btn.textContent='🔗 Copy Link', 2000)
    })
  }

  window.shareChatLinkWA = function(token) {
    const chatUrl = `${location.origin}${location.pathname.replace('order.html','chat.html')}?t=${token}`
    const msg = `Halo *${order.customerName}*,\n\nBerikut link untuk memantau progress dan berdiskusi desain pesanan Anda (*${order.orderNumber}*):\n\n${chatUrl}\n\nMelalui link ini Anda bisa:\n✅ Lihat status pengerjaan\n✅ Diskusi & kirim referensi desain\n✅ Chat langsung dengan tim Harmoni\n\n_Harmoni · Makassar_`
    const contact = (order.customerContact||'').replace(/\D/g,'').replace(/^0/,'62')
    const url = contact.startsWith('62')
      ? `https://wa.me/${contact}?text=${encodeURIComponent(msg)}`
      : `https://wa.me/?text=${encodeURIComponent(msg)}`
    window.open(url, '_blank')
  }

  window.generateToken = async function() {
    const token = generateChatToken()
    await updateDoc(doc(db,'orders',orderId), { chatToken: token, updatedAt: Timestamp.now() })
    await setDoc(doc(db,'public_order_info',token), {
      orderId, orderNumber: order.orderNumber,
      division: order.division,
      customerName: order.customerName,
      status: order.status, chatToken: token,
      createdAt: Timestamp.now(),
    })
    await loadOrder(getProfile())
  }

  window.backFromInvoice = function() { location.reload() }

  window.sendWA = function() {
    const sisa = (order.totalPrice||0) - (order.depositPaid||0)
    const isPaid = sisa <= 0 && (order.totalPrice||0)>0
    const chatUrl = order.chatToken
      ? `https://adhiitmuh.github.io/custom-order-harmoni/chat.html?t=${order.chatToken}`
      : null
    const itemLines = (order.orderItems?.length)
      ? [
          `*RINCIAN ITEM*`,
          ...order.orderItems.map(it => {
            const label = it.varian ? `${it.name} (${it.varian})` : it.name
            return `• ${label}: ${it.qty||1}pcs × ${fmtCurrency(it.pricePerUnit)} = ${fmtCurrency(it.subtotal)}`
          }),
          ``
        ]
      : []
    const lines = [
      `*INVOICE HARMONI*`, ``,
      `No. Order: *${order.orderNumber}*`,
      `Divisi: ${DIVISION_META[order.division]?.label}`,
      `Status: ${STATUS_LABEL[order.status]}`, ``,
      `*Pemesan:* ${order.customerName}`,
      `*Tanggal Pesan:* ${fmtDate(order.orderDate)}`,
      `*Target Selesai:* ${fmtDate(order.dueDate)}`, ``,
      ...itemLines,
      `*RINCIAN PEMBAYARAN*`,
      `Total Harga: ${fmtCurrency(order.totalPrice)}`,
      `DP Dibayar: ${fmtCurrency(order.depositPaid)}`,
      `Sisa Bayar: *${fmtCurrency(sisa)}*`, ``,
      order.notes ? `Catatan: ${order.notes}\n` : '',
      `Progress: ${order.progressPercentage||0}%`, ``,
      isPaid ? `✅ Status Pembayaran: LUNAS` : `⚠ Mohon segera melunasi sisa pembayaran`, ``,
      chatUrl ? `📱 *Pantau progress & diskusi desain pesanan Anda:*\n${chatUrl}` : '',
      ``,
      `Terima kasih telah mempercayakan pesanan Anda kepada *Harmoni* 🙏`,
    ].filter(Boolean).join('\n')
    const contact = (order.customerContact||'').replace(/\D/g,'').replace(/^0/,'62')
    const url = contact.startsWith('62')
      ? `https://wa.me/${contact}?text=${encodeURIComponent(lines)}`
      : `https://wa.me/?text=${encodeURIComponent(lines)}`
    window.open(url,'_blank')
  }
</script>
</body>

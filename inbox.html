<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Inbox — Harmoni</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Override main for full-height chat layout */
    .main { padding: 0 !important; display: flex; flex-direction: column; height: 100vh; overflow: hidden; max-width: none !important; }

    /* Top header bar */
    .inbox-topbar {
      padding: 14px 20px 12px; border-bottom: 1px solid rgba(3,69,67,.08);
      background: var(--white); display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }

    /* Two-column body */
    .inbox-body { display: flex; flex: 1; overflow: hidden; }

    /* Thread list */
    .thread-panel {
      width: 280px; flex-shrink: 0; border-right: 1px solid rgba(3,69,67,.08);
      display: flex; flex-direction: column; overflow: hidden; background: var(--white);
    }
    .thread-panel-head {
      padding: 12px 14px 10px; border-bottom: 1px solid rgba(3,69,67,.07); flex-shrink: 0;
    }
    .filter-tabs { display: flex; gap: 3px; flex-wrap: wrap; }
    .ftab {
      font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 999px;
      cursor: pointer; border: 1.5px solid transparent; color: rgba(3,69,67,.5);
      background: none; font-family: inherit; transition: all .1s;
    }
    .ftab.active { background: var(--green); color: var(--beige); }
    .ftab:hover:not(.active) { background: rgba(3,69,67,.06); }
    .thread-list { flex: 1; overflow-y: auto; }

    /* Thread row */
    .thread-row {
      padding: 11px 14px; border-bottom: 1px solid rgba(3,69,67,.05);
      cursor: pointer; transition: background .1s;
    }
    .thread-row:hover { background: rgba(3,69,67,.03); }
    .thread-row.active { background: rgba(3,69,67,.07); }
    .tr-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
    .tr-token { font-family: monospace; font-size: 11px; font-weight: 700; color: var(--green); }
    .tr-time { font-size: 10px; color: rgba(3,69,67,.35); }
    .tr-name { font-size: 13px; font-weight: 600; color: var(--black); }
    .tr-preview { font-size: 12px; color: rgba(3,69,67,.45); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .tr-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .unread-pill { background: var(--green); color: var(--beige); font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 999px; min-width: 18px; text-align: center; }

    /* Status badges for threads */
    .th-open       { background: #dbeafe; color: #1e40af; }
    .th-closed     { background: #f1f5f9; color: #475569; }
    .th-escalated  { background: #fef3c7; color: #92400e; }

    /* Chat panel */
    .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--white); }

    /* Empty state */
    .chat-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: rgba(3,69,67,.3); background: #f7faf7; }

    /* Chat header */
    .chat-head {
      padding: 12px 18px; border-bottom: 1px solid rgba(3,69,67,.08);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
      background: var(--white);
    }
    .chat-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: rgba(3,69,67,.1);
      display: flex; align-items: center; justify-content: center; font-weight: 700;
      font-size: 14px; color: var(--green); flex-shrink: 0;
    }

    /* Messages area */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column;
      gap: 10px; background: #f3f7f3;
    }

    /* Message rows */
    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.customer { justify-content: flex-start; }
    .msg-row.admin, .msg-row.ai { justify-content: flex-end; }

    .bubble {
      max-width: 68%; padding: 9px 13px; border-radius: 14px;
      font-size: 13px; line-height: 1.55;
    }
    .bubble.customer { background: var(--white); border-radius: 14px 14px 14px 4px; color: var(--black); box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .bubble.admin    { background: var(--green); color: var(--beige); border-radius: 14px 14px 4px 14px; }
    .bubble.ai       { background: #e0f2fe; color: #0c4a6e; border-radius: 14px 14px 4px 14px; }
    .bubble.flagged  { outline: 2px solid #ef4444; }
    .bubble-time { font-size: 10px; opacity: .5; margin-top: 4px; text-align: right; }
    .sender-label { font-size: 10px; color: rgba(3,69,67,.4); margin-bottom: 3px; }
    .flag-tag { background: #fee2e2; color: #b91c1c; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-top: 5px; display: inline-block; }

    .msg-icon {
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0;
    }

    /* Reply input */
    .chat-input {
      padding: 11px 14px; border-top: 1px solid rgba(3,69,67,.08);
      background: var(--white); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    .reply-ta {
      flex: 1; border: 1.5px solid rgba(3,69,67,.15); border-radius: 20px;
      padding: 9px 15px; font-size: 14px; font-family: inherit;
      resize: none; outline: none; max-height: 120px; min-height: 40px; line-height: 1.4;
    }
    .reply-ta:focus { border-color: var(--green); }
    .send-btn {
      background: var(--green); color: var(--beige); border: none; border-radius: 50%;
      width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 18px; flex-shrink: 0;
    }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Closed footer */
    .closed-bar {
      padding: 11px 18px; background: #f8fafc; border-top: 1px solid rgba(3,69,67,.08);
      text-align: center; font-size: 12px; color: rgba(3,69,67,.45); flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="layout">
  <nav id="sidebar"></nav>
  <main class="main">

    <!-- Top bar -->
    <div class="inbox-topbar">
      <div>
        <p style="font-size:10px;color:var(--green);opacity:.4;letter-spacing:.07em;margin-bottom:2px">KOMUNIKASI</p>
        <h1 style="font-size:19px;font-weight:800;letter-spacing:-.025em;color:var(--black)">Chat Inbox</h1>
      </div>
      <span id="inboxCount" style="font-size:12px;color:rgba(3,69,67,.4);font-family:monospace">—</span>
    </div>

    <div class="inbox-body">

      <!-- Thread list panel -->
      <div class="thread-panel">
        <div class="thread-panel-head">
          <div class="filter-tabs">
            <button class="ftab active" data-f="open"      onclick="setFilter('open')">Aktif</button>
            <button class="ftab"        data-f="escalated" onclick="setFilter('escalated')">Eskalasi</button>
            <button class="ftab"        data-f="closed"    onclick="setFilter('closed')">Selesai</button>
            <button class="ftab"        data-f="all"       onclick="setFilter('all')">Semua</button>
          </div>
        </div>
        <div class="thread-list" id="threadListEl">
          <div class="loading">Memuat…</div>
        </div>
      </div>

      <!-- Chat panel -->
      <div class="chat-panel" id="chatPanelEl">
        <div class="chat-empty" id="chatEmptyEl">
          <div style="font-size:42px">💬</div>
          <p style="font-size:14px;font-weight:600">Pilih chat di sebelah kiri</p>
          <p style="font-size:12px">untuk mulai membalas pesan customer</p>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Modal: Buat Order dari Chat -->
<div id="orderModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--white);border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto">
    <div style="padding:18px 22px;border-bottom:1px solid rgba(3,69,67,.08);display:flex;align-items:center;justify-content:space-between">
      <div>
        <h2 style="font-size:16px;font-weight:800;color:var(--black)">Buat Order dari Chat</h2>
        <p id="omThreadInfo" style="font-size:12px;color:rgba(3,69,67,.45);margin-top:2px"></p>
      </div>
      <button onclick="closeOrderModal()" style="background:none;border:none;cursor:pointer;font-size:20px;color:rgba(3,69,67,.4);padding:4px">✕</button>
    </div>
    <form onsubmit="event.preventDefault();submitOrder()" style="padding:18px 22px">
      <div class="form-group">
        <label>Divisi <span class="req">*</span></label>
        <select id="om_div" required></select>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Total Harga (Rp) <span class="req">*</span></label>
          <input type="number" id="om_price" min="0" required placeholder="0">
        </div>
        <div class="form-group">
          <label>DP Masuk (Rp)</label>
          <input type="number" id="om_dp" min="0" placeholder="0 (opsional)">
        </div>
      </div>
      <div class="form-group">
        <label>Target Selesai <span class="req">*</span></label>
        <input type="date" id="om_due" required>
      </div>
      <div class="form-group">
        <label>Catatan / Spesifikasi</label>
        <textarea id="om_notes" rows="3" placeholder="Qty, warna, bahan, dll…"></textarea>
      </div>
      <div id="omAlert"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" id="omSubmitBtn">
        Buat Order
      </button>
    </form>
  </div>
</div>

<script type="module">
import { db, auth, storage } from './js/config.js'
import { requireAuth, dataAuthReady, getProfile } from './js/auth.js'
import { ref, uploadBytesResumable, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js'
import {
  collection, doc, query, orderBy, onSnapshot, updateDoc, addDoc, Timestamp
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'
import { timeAgo, DIVISION_META, DIVISIONS, hasContactInfo, detectSuspiciousMsg } from './js/utils.js'

// ─── Config ───────────────────────────────────────────────────────────────────
const WORKER_URL = 'https://harmoni-order-api.adhiitmuh.workers.dev'

// ─── State ────────────────────────────────────────────────────────────────────
let allThreads      = []  // chat_threads (WA bot) + consultations merged
let currentFilter   = 'open'
let activeThreadId  = null
let unsubMsgs       = null
let _profile        = null

// ─── Boot ─────────────────────────────────────────────────────────────────────
requireAuth(async (profile) => {
  if (!['owner', 'manager', 'cs'].includes(profile.role)) {
    window.location.href = 'dashboard.html'; return
  }

  _profile = profile
  await dataAuthReady

  const userLokasiId = profile.lokasiId || null
  const isOwner = profile.role === 'owner'

  // Listener 1: WA bot threads
  let waThreads = []
  onSnapshot(
    query(collection(db, 'chat_threads'), orderBy('lastMessageAt', 'desc')),
    snap => {
      const all = snap.docs.map(d => ({ id: d.id, _type: 'thread', ...d.data() }))
      waThreads = isOwner ? all : all.filter(t => !t.lokasiId || t.lokasiId === userLokasiId)
      mergeAndRender(waThreads, consultations)
    },
    () => {}
  )

  // Listener 2: consultations (pra-order)
  let consultations = []
  onSnapshot(
    query(collection(db, 'consultations'), orderBy('createdAt', 'desc')),
    snap => {
      consultations = snap.docs.map(d => ({
        id: d.id,
        _type: 'consultation',
        token: d.id,
        status: d.data().status === 'converted' ? 'closed' : 'open',
        customerName: d.data().customerName,
        lastMessage: d.data().lastMessage || '',
        lastMessageAt: d.data().updatedAt || d.data().createdAt,
        unreadCount: d.data().unreadCount || 0,
        hasFlag: d.data().hasFlag || false,
        division: d.data().division || '',
        ...d.data(),
      }))
      mergeAndRender(waThreads, consultations)
    },
    () => {}
  )

  function mergeAndRender(threads, consults) {
    // Merge + sort by lastMessageAt desc
    allThreads = [...threads, ...consults].sort((a, b) => {
      const ta = a.lastMessageAt?.toMillis?.() || a.lastMessageAt?.seconds * 1000 || 0
      const tb = b.lastMessageAt?.toMillis?.() || b.lastMessageAt?.seconds * 1000 || 0
      return tb - ta
    })
    const openCount = allThreads.filter(t => t.status === 'open').length
    document.getElementById('inboxCount').textContent =
      `${openCount} aktif · ${allThreads.length} total`
    renderList()
  }
})

// ─── Filter ───────────────────────────────────────────────────────────────────
window.setFilter = function(f) {
  currentFilter = f
  document.querySelectorAll('.ftab').forEach(el => {
    el.classList.toggle('active', el.dataset.f === f)
  })
  renderList()
}

// ─── Render thread list ───────────────────────────────────────────────────────
function renderList() {
  const list = currentFilter === 'all'
    ? allThreads
    : allThreads.filter(t => t.status === currentFilter)
  const el = document.getElementById('threadListEl')

  if (!list.length) {
    el.innerHTML = `<div style="padding:32px 16px;text-align:center;font-size:13px;color:rgba(3,69,67,.35)">Belum ada thread</div>`
    return
  }

  el.innerHTML = list.map(t => {
    const stCls = { open: 'th-open', closed: 'th-closed', escalated: 'th-escalated' }[t.status] || 'th-open'
    const stLabel = { open: 'Aktif', closed: 'Selesai', escalated: 'Eskalasi' }[t.status] || t.status
    const unread = t.unreadCount > 0
    return `
      <div class="thread-row ${t.id === activeThreadId ? 'active' : ''}" onclick="openThread('${t.id}')">
        <div class="tr-head">
          <span class="tr-token">${t.token || '—'}</span>
          <span class="tr-time">${timeAgo(t.lastMessageAt)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="tr-name">${esc(t.customerName || 'Customer')}</span>
          ${t.hasFlag ? `<span title="Ada pesan mencurigakan" style="font-size:12px">🚩</span>` : ''}
        </div>
        <div class="tr-preview">${esc(t.lastMessage || '—')}</div>
        <div class="tr-footer">
          <span class="badge ${stCls}" style="font-size:9px;padding:2px 6px">${stLabel}</span>
          <div style="display:flex;align-items:center;gap:4px">
            ${t.orderId ? `<span style="font-size:10px;font-family:monospace;color:rgba(3,69,67,.4)">${esc(t.orderNumber || '·')}</span>` : ''}
            ${unread ? `<span class="unread-pill">${t.unreadCount}</span>` : ''}
          </div>
        </div>
      </div>`
  }).join('')
}

// ─── Open thread ──────────────────────────────────────────────────────────────
window.openThread = function(threadId) {
  activeThreadId = threadId
  renderList()

  const thread = allThreads.find(t => t.id === threadId)
  if (!thread) return

  const isConsultation = thread._type === 'consultation'

  // Clear unread
  if (thread.unreadCount > 0) {
    const col = isConsultation ? 'consultations' : 'chat_threads'
    updateDoc(doc(db, col, threadId), { unreadCount: 0 }).catch(() => {})
    const idx = allThreads.findIndex(t => t.id === threadId)
    if (idx >= 0) allThreads[idx] = { ...allThreads[idx], unreadCount: 0 }
  }

  if (unsubMsgs) { unsubMsgs(); unsubMsgs = null }

  const stCls   = { open: 'th-open', closed: 'th-closed', escalated: 'th-escalated' }[thread.status] || 'th-open'
  const stLabel = { open: 'Aktif', closed: 'Selesai', escalated: 'Eskalasi' }[thread.status] || thread.status
  const isClosed = thread.status === 'closed'

  const panel = document.getElementById('chatPanelEl')
  panel.innerHTML = `
    <div class="chat-head">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="chat-avatar">${(thread.customerName || '?')[0].toUpperCase()}</div>
        <div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:15px;font-weight:700;color:var(--black)">${esc(thread.customerName || 'Customer')}</span>
            ${isConsultation ? `<span style="font-size:10px;background:#dbeafe;color:#1e40af;padding:1px 7px;border-radius:4px;font-weight:700">KONSULTASI</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
            <span style="font-family:monospace;font-size:11px;color:rgba(3,69,67,.45)">${esc(thread.token || threadId)}</span>
            <span class="badge ${stCls}" style="font-size:9px;padding:2px 6px">${stLabel}</span>
            ${thread.division ? `<span style="font-size:10px;color:rgba(3,69,67,.4)">${esc(thread.division)}</span>` : ''}
          </div>
        </div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${!isConsultation && thread.orderId
          ? `<a href="order.html?id=${thread.orderId}" class="btn btn-ghost btn-sm" style="font-size:11px">📋 ${thread.orderNumber || 'Lihat Order'}</a>`
          : (!isClosed ? `<button onclick="openOrderModal()" class="btn btn-primary btn-sm" style="font-size:11px">+ Buat Order</button>` : '')}
        ${!isClosed ? `<button onclick="setStatus('closed')" class="btn btn-ghost btn-sm" style="font-size:11px">✓ Tutup</button>` : ''}
        ${!isConsultation && thread.status === 'open' ? `<button onclick="setStatus('escalated')" class="btn btn-sm" style="background:#fef3c7;color:#92400e;border:1.5px solid #fde68a;font-size:11px">⚠ Eskalasi</button>` : ''}
        ${isClosed ? `<button onclick="setStatus('open')" class="btn btn-ghost btn-sm" style="font-size:11px">↺ Buka Lagi</button>` : ''}
      </div>
    </div>

    <div class="chat-messages" id="msgAreaEl">
      <div class="loading">Memuat pesan…</div>
    </div>

    ${!isClosed ? `
    <div id="inboxPhotoPreview" style="display:none;padding:6px 14px;background:#f0fdf4;border-top:1px solid #bbf7d0;font-size:12px;color:#065f46;align-items:center;gap:8px;flex-shrink:0">
      <span id="inboxPhotoName" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <button onclick="cancelInboxPhoto()" style="background:none;border:none;cursor:pointer;color:#b91c1c;font-size:14px;padding:0">✕</button>
    </div>
    <div class="chat-input">
      <label title="Kirim foto" style="background:var(--beige-soft);border:1.5px solid rgba(3,69,67,.15);border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center">
        📎<input type="file" id="inboxPhotoInput" accept="image/*" style="display:none" onchange="selectInboxPhoto(this)">
      </label>
      <textarea class="reply-ta" id="replyTa" placeholder="Ketik balasan… (Enter kirim, Shift+Enter baris baru)"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply()}"></textarea>
      <button class="send-btn" id="sendBtnEl" onclick="sendReply()" title="Kirim">↑</button>
    </div>` : `
    <div class="closed-bar">
      Thread ditutup —
      <button onclick="setStatus('open')" style="background:none;border:none;cursor:pointer;color:var(--green);font-size:12px;font-weight:600;font-family:inherit">buka kembali</button>
    </div>`}
  `

  if (isConsultation) {
    // Consultations: messages in chat_messages/{token}/messages (same as order chat)
    unsubMsgs = onSnapshot(
      query(collection(db, 'chat_messages', threadId, 'messages'), orderBy('createdAt', 'asc')),
      snap => {
        const msgs = snap.docs.map(d => {
          const m = d.data()
          // Normalise to inbox schema
          return {
            id: d.id,
            content: m.text || '',
            imageUrl: m.imageUrl || null,
            fileName: m.fileName || '',
            senderType: m.senderRole === 'customer' ? 'customer' : 'admin',
            senderName: m.senderName || '',
            createdAt: m.createdAt,
            flagged: m.flagged || false,
            flagReason: m.flagReason || '',
          }
        })
        renderMessages(msgs)
      }
    )
  } else {
    unsubMsgs = onSnapshot(
      query(collection(db, 'chat_threads', threadId, 'messages'), orderBy('createdAt', 'asc')),
      snap => {
        const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        renderMessages(msgs)
      }
    )
  }
}

// ─── Render messages ──────────────────────────────────────────────────────────
function renderMessages(msgs) {
  const el = document.getElementById('msgAreaEl')
  if (!el) return

  if (!msgs.length) {
    el.innerHTML = `<div style="text-align:center;padding:32px;font-size:13px;color:rgba(3,69,67,.35)">Belum ada pesan</div>`
    return
  }

  const wasAtBottom = el.scrollHeight - el.clientHeight - el.scrollTop < 60

  el.innerHTML = msgs.map(m => {
    const st = m.senderType || 'customer'
    const isCustomer = st === 'customer'
    const isAI = st === 'ai'
    const time = timeAgo(m.createdAt)
    const iconBg = isCustomer ? 'rgba(3,69,67,.1)' : isAI ? '#e0f2fe' : 'var(--green)'
    const iconColor = isCustomer ? 'var(--green)' : isAI ? '#0c4a6e' : 'var(--beige)'
    const iconLabel = isCustomer ? (m.customerInitial || 'C') : isAI ? '🤖' : (m.senderName?.[0] || 'A')

    return `
      <div class="msg-row ${st}">
        ${isCustomer ? `<div class="msg-icon" style="background:${iconBg};color:${iconColor}">${iconLabel}</div>` : ''}
        <div style="display:flex;flex-direction:column;align-items:${isCustomer ? 'flex-start' : 'flex-end'}">
          ${isAI ? `<div class="sender-label">🤖 AI Agent</div>` : ''}
          ${!isCustomer && !isAI && m.senderName ? `<div class="sender-label">${esc(m.senderName)}</div>` : ''}
          <div class="bubble ${st}${m.flagged ? ' flagged' : ''}">
            ${m.imageUrl ? `<a href="${m.imageUrl}" target="_blank"><img src="${m.imageUrl}" style="max-width:200px;max-height:200px;border-radius:8px;display:block;object-fit:cover;margin-bottom:${m.content ? '6px' : '0'}"></a>` : ''}
            ${m.content ? `<div style="white-space:pre-wrap">${esc(m.content || '')}</div>` : ''}
            ${m.flagged ? `<div class="flag-tag">🚩 ${esc(m.flagReason || 'Konten mencurigakan')}</div>` : ''}
            <div class="bubble-time">${time}</div>
          </div>
        </div>
        ${!isCustomer ? `<div class="msg-icon" style="background:${iconBg};color:${iconColor}">${iconLabel}</div>` : ''}
      </div>`
  }).join('')

  if (wasAtBottom) el.scrollTop = el.scrollHeight
}

// ─── Photo upload for inbox ───────────────────────────────────────────────────
let _inboxPhotoFile = null

window.selectInboxPhoto = function(input) {
  const file = input.files[0]
  if (!file) return
  _inboxPhotoFile = file
  document.getElementById('inboxPhotoName').textContent = '📷 ' + file.name
  document.getElementById('inboxPhotoPreview').style.display = 'flex'
  input.value = ''
}

window.cancelInboxPhoto = function() {
  _inboxPhotoFile = null
  document.getElementById('inboxPhotoPreview').style.display = 'none'
  document.getElementById('inboxPhotoName').textContent = ''
}

// ─── Send reply ───────────────────────────────────────────────────────────────
window.sendReply = async function() {
  const ta  = document.getElementById('replyTa')
  const btn = document.getElementById('sendBtnEl')
  const msg = ta?.value.trim()
  const file = _inboxPhotoFile
  if (!msg && !file || !activeThreadId) return

  const thread = allThreads.find(t => t.id === activeThreadId)
  if (!thread) return
  const isConsultation = thread._type === 'consultation'
  const profile = getProfile()

  // Block contact info (both thread types)
  if (hasContactInfo(msg)) {
    addDoc(collection(db, 'chat_flags'), {
      chatToken: thread.token || activeThreadId,
      orderId: thread.orderId || null,
      orderNumber: thread.orderNumber || '',
      staffId: profile?.id || '', staffName: profile?.name || '', staffRole: profile?.role || '',
      messageText: msg,
      flagReason: 'Percobaan kirim info kontak (diblokir sistem)',
      flagType: 'blocked', reviewed: false, createdAt: Timestamp.now(),
    }).catch(() => {})
    alert('⚠ Pesan mengandung informasi kontak yang tidak boleh dibagikan kepada customer. Pesan tidak dikirim.')
    return
  }

  btn.disabled = true
  ta.disabled  = true

  try {
    // Upload photo first if any
    let imageUrl = null
    if (file) {
      const path = `inbox/${activeThreadId}/${Date.now()}_${file.name}`
      const storRef = ref(storage, path)
      await new Promise((resolve, reject) => {
        const task = uploadBytesResumable(storRef, file)
        task.on('state_changed', null, reject, async () => {
          imageUrl = await getDownloadURL(storRef)
          resolve()
        })
      })
      cancelInboxPhoto()
    }

    if (isConsultation) {
      // Consultation: write directly to Firestore (no Worker needed)
      const { flagged, reason } = detectSuspiciousMsg(msg)
      const token = thread.token || activeThreadId
      await addDoc(collection(db, 'chat_messages', token, 'messages'), {
        text: msg, imageUrl, type: imageUrl ? 'image' : 'text',
        senderId: profile?.id || '', senderName: profile?.name || '',
        senderRole: profile?.role || 'admin', senderBranch: profile?.branch || '',
        createdAt: Timestamp.now(),
      })
      updateDoc(doc(db, 'consultations', activeThreadId), {
        lastMessage: imageUrl && !msg ? '📷 Foto' : msg, lastMessageAt: Timestamp.now(),
      }).catch(() => {})
      if (flagged && msg) {
        addDoc(collection(db, 'chat_flags'), {
          chatToken: token, orderId: null, orderNumber: '',
          staffId: profile?.id || '', staffName: profile?.name || '', staffRole: profile?.role || '',
          messageText: msg, flagReason: reason,
          flagType: 'suspicious', reviewed: false, createdAt: Timestamp.now(),
        }).catch(() => {})
      }
    } else {
      // WA bot thread: send text via Worker, photo stored in Firestore only
      if (imageUrl) {
        await addDoc(collection(db, 'chat_threads', activeThreadId, 'messages'), {
          content: msg, imageUrl, type: 'image',
          senderType: 'admin', senderId: profile?.id || '', senderName: profile?.name || '',
          createdAt: Timestamp.now(),
        })
        updateDoc(doc(db, 'chat_threads', activeThreadId), {
          lastMessage: '📷 Foto' + (msg ? ': ' + msg : ''), lastMessageAt: Timestamp.now(),
        }).catch(() => {})
      }
      if (msg) {
        if (!WORKER_URL) {
          alert('WORKER_URL belum dikonfigurasi di inbox.html. Isi dengan URL Cloudflare Worker Anda.')
          btn.disabled = false; ta.disabled = false
          return
        }
        const idToken = await auth.currentUser.getIdToken()
        const resp = await fetch(`${WORKER_URL}/send-chat-reply`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ threadId: activeThreadId, message: msg, adminId: profile?.id, adminName: profile?.name }),
        })
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}))
          throw new Error(err.error || `HTTP ${resp.status}`)
        }
      }
    }
    ta.value = ''
    ta.style.height = 'auto'
  } catch (err) {
    alert('Gagal kirim: ' + err.message)
  } finally {
    btn.disabled = false
    ta.disabled  = false
    ta?.focus()
  }
}

// ─── Set thread status ────────────────────────────────────────────────────────
window.setStatus = async function(status) {
  if (!activeThreadId) return
  const thread = allThreads.find(t => t.id === activeThreadId)
  if (!thread) return
  const col = thread._type === 'consultation' ? 'consultations' : 'chat_threads'
  try {
    await updateDoc(doc(db, col, activeThreadId), { status, updatedAt: Timestamp.now() })
    const idx = allThreads.findIndex(t => t.id === activeThreadId)
    if (idx >= 0) allThreads[idx] = { ...allThreads[idx], status }
    openThread(activeThreadId)
  } catch (err) {
    alert('Gagal update: ' + err.message)
  }
}

// ─── Buat Order Modal ────────────────────────────────────────────────────────
window.openOrderModal = function() {
  const thread = allThreads.find(t => t.id === activeThreadId)
  if (!thread) return

  document.getElementById('omThreadInfo').textContent =
    `${thread.token || ''} — ${thread.customerName || 'Customer'}`

  // Default due date: 7 hari ke depan
  const due = new Date()
  due.setDate(due.getDate() + 7)
  document.getElementById('om_due').value = due.toISOString().split('T')[0]

  // Isi dropdown divisi
  document.getElementById('om_div').innerHTML =
    DIVISIONS.map(d => `<option value="${d}">${DIVISION_META[d].icon} ${DIVISION_META[d].label}</option>`).join('')

  // Reset form
  document.getElementById('om_price').value = ''
  document.getElementById('om_dp').value = ''
  document.getElementById('om_notes').value = ''
  document.getElementById('omAlert').innerHTML = ''
  const btn = document.getElementById('omSubmitBtn')
  btn.disabled = false; btn.textContent = 'Buat Order'

  document.getElementById('orderModal').style.display = 'flex'
}

window.closeOrderModal = function() {
  document.getElementById('orderModal').style.display = 'none'
}

// Tutup modal klik di luar
document.getElementById('orderModal').addEventListener('click', e => {
  if (e.target === document.getElementById('orderModal')) closeOrderModal()
})

window.submitOrder = async function() {
  if (!WORKER_URL) {
    alert('WORKER_URL belum dikonfigurasi di inbox.html. Isi dulu dengan URL Cloudflare Worker Anda.')
    return
  }

  const btn     = document.getElementById('omSubmitBtn')
  const alertEl = document.getElementById('omAlert')
  btn.disabled = true; btn.textContent = 'Membuat order…'
  alertEl.innerHTML = ''

  try {
    const idToken = await auth.currentUser.getIdToken()
    const resp = await fetch(`${WORKER_URL}/create-order-from-chat`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${idToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        threadId:   activeThreadId,
        division:   document.getElementById('om_div').value,
        totalPrice: Number(document.getElementById('om_price').value) || 0,
        dp:         Number(document.getElementById('om_dp').value) || 0,
        dueDate:    document.getElementById('om_due').value,
        notes:      document.getElementById('om_notes').value.trim(),
      }),
    })

    const result = await resp.json()
    if (!resp.ok) throw new Error(result.error || `HTTP ${resp.status}`)

    // Update cache lokal supaya tombol langsung berubah jadi link order
    const idx = allThreads.findIndex(t => t.id === activeThreadId)
    if (idx >= 0) {
      allThreads[idx] = { ...allThreads[idx], orderId: result.orderId, orderNumber: result.orderNumber }
    }

    closeOrderModal()
    openThread(activeThreadId) // Refresh panel — header sekarang tampilkan "📋 HRM-xxx"

    // Toast sukses singkat
    showToast(`✅ ${result.orderNumber} berhasil dibuat! Customer sudah dikirimi notif WA.`)
  } catch (err) {
    alertEl.innerHTML = `<div class="alert alert-error" style="margin-top:10px">${err.message}</div>`
    btn.disabled = false; btn.textContent = 'Buat Order'
  }
}

function showToast(msg) {
  const t = document.createElement('div')
  t.textContent = msg
  Object.assign(t.style, {
    position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)',
    background:'#034543', color:'#FFFBD5', padding:'11px 20px', borderRadius:'10px',
    fontSize:'13px', fontWeight:'600', zIndex:'999', animation:'slideUp .2s ease',
    whiteSpace:'nowrap', boxShadow:'0 4px 16px rgba(0,0,0,.2)',
  })
  document.body.appendChild(t)
  setTimeout(() => t.remove(), 4000)
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

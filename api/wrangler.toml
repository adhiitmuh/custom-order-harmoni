name = "harmoni-order-api"
main = "create-order.js"
compatibility_date = "2024-01-01"

[triggers]
crons = ["0 0 * * *", "0 18 * * 0"]
# 0 0 * * *  → setiap hari jam 08.00 WITA (00:00 UTC) — deadline reminder
# 0 18 * * 0 → setiap Minggu jam 02.00 WITA (18:00 UTC Sabtu) — auto backup ke R2

[[r2_buckets]]
binding = "BACKUP_BUCKET"
bucket_name = "harmoni-backups"

# Set env vars via CLI (jangan hardcode di sini):
#   npx wrangler secret put FIREBASE_PROJECT_ID
#   npx wrangler secret put FIREBASE_SERVICE_ACCOUNT_KEY
#   npx wrangler secret put FONNTE_API_KEY
#   npx wrangler secret put OWNER_WA_NUMBER
#   npx wrangler secret put API_SECRET_KEY
#   npx wrangler secret put NOTIFY_KEY      (key untuk chat.html → /notify-cs dan n8n → /incoming-chat)
#   npx wrangler secret put FIREBASE_AUTH_API_KEY  (opsional — default sudah hardcoded, nilai: AIzaSyA9V5Lw40pDeAWeQKijYCkdvnag8AlEe74)

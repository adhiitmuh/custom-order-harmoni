<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Knowledge — Harmoni</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .price-table { width:100%; border-collapse:collapse; font-size:13px; }
    .price-table th { text-align:left; padding:8px 6px; font-size:10px; font-weight:700; letter-spacing:.05em; color:rgba(3,69,67,.45); border-bottom:2px solid rgba(3,69,67,.1); white-space:nowrap; }
    .price-table th:first-child { padding-left:10px; }
    .price-table td { padding:9px 6px; border-bottom:1px solid rgba(3,69,67,.06); color:var(--black); vertical-align:middle; white-space:nowrap; }
    .price-table td:first-child { white-space:normal; width:99%; padding-left:10px; }
    .price-table tr:last-child td { border-bottom:none; }
    .price-table tr:hover td { background:rgba(3,69,67,.02); }
    .tier-normal { font-weight:700; color:#059669; }
    .tier-promo  { font-weight:700; color:#d97706; }
    .tier-admin  { font-weight:700; color:#b91c1c; }
    .tier-badge { display:inline-flex; align-items:center; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:700; margin-left:4px; }
    .tb-normal { background:#dcfce7; color:#166534; }
    .tb-promo  { background:#fef3c7; color:#92400e; }
    .tb-admin  { background:#fee2e2; color:#991b1b; }
    .tier-modal { font-weight:700; color:#7c3aed; }
    .tb-modal  { background:#ede9fe; color:#4c1d95; }
    .inp-inline {
      border: none; background: transparent; font-size: 13px;
      font-weight: inherit; color: inherit; width: 100%; outline: none;
      padding: 2px 0; cursor: pointer; min-width: 60px;
      border-bottom: 1.5px dashed transparent; transition: border-color .15s;
    }
    .inp-inline:hover { border-bottom-color: rgba(3,69,67,.25); }
    .inp-inline:focus { border-bottom-color: currentColor; cursor: text; }
    .inp-inline::placeholder { color: rgba(3,69,67,.2); font-weight: 400; }
    .inp-inline[type=number]::-webkit-inner-spin-button,
    .inp-inline[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .inp-inline[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
<div class="layout">
  <nav id="sidebar"></nav>
  <main class="main">
    <div style="margin-bottom:20px">
      <p style="font-size:11px;color:var(--green);opacity:.4;letter-spacing:.06em;margin-bottom:4px">REFERENSI</p>
      <h1 style="font-size:24px;font-weight:800;letter-spacing:-.025em;color:var(--black)" id="pageTitle">Product Knowledge</h1>
    </div>

    <!-- Division tabs -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px" id="divTabs"></div>

    <div id="knowledgeContent"><div class="loading">Memuat…</div></div>
  </main>
</div>

<!-- Edit content modal -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:560px;max-height:80vh;overflow-y:auto">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px" id="modalTitle">Edit Konten</h3>
    <div class="form-group"><label>Judul</label><input type="text" id="modalTitleInput"></div>
    <div class="form-group">
      <label>Konten</label>
      <p style="font-size:11px;color:rgba(3,69,67,.4);margin-bottom:6px">Gunakan **teks** untuk tebal, baris baru untuk paragraf baru</p>
      <textarea id="modalContent" rows="12" style="font-family:monospace;font-size:13px"></textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="closeModal()" class="btn btn-ghost" style="flex:1;justify-content:center">Batal</button>
      <button onclick="saveSection()" class="btn btn-primary" style="flex:1;justify-content:center" id="modalSaveBtn">Simpan</button>
    </div>
  </div>
</div>

<!-- Price list modal -->
<div id="priceModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:680px;max-height:85vh;overflow-y:auto">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px" id="priceModalTitle">Edit Daftar Harga</h3>
    <div id="priceRows" style="margin-bottom:14px"></div>
    <button onclick="addPriceRow()" class="btn btn-ghost btn-sm" style="margin-bottom:14px;width:100%;justify-content:center">＋ Tambah Baris</button>
    <div style="display:flex;gap:8px">
      <button onclick="closePriceModal()" class="btn btn-ghost" style="flex:1;justify-content:center">Batal</button>
      <button onclick="savePriceList()" class="btn btn-primary" style="flex:1;justify-content:center" id="priceSaveBtn">Simpan</button>
    </div>
  </div>
</div>

<script type="module">
  import { db } from './js/config.js'
  import { requireAuth, getProfile, dataAuthReady } from './js/auth.js'
  import { collection, query, where, getDocs, doc, setDoc, addDoc, deleteDoc, getDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'
  import { DIVISION_META, DIVISIONS } from './js/utils.js'

  const params = new URLSearchParams(location.search)
  let activeDiv = params.get('div') || ''
  let editingDocId = null
  let editingPriceDiv = null
  let sections = []
  const contentCache = {}
  let priceDataStore = {}
  let _inlineSaveTimers = {}
  let _savedToast = null

  requireAuth((profile) => {
    renderTabs(profile)
    loadContent(profile)
  })

  function renderTabs(profile) {
    const el = document.getElementById('divTabs')
    el.innerHTML = ''
    const allBtn = document.createElement('button')
    allBtn.className = `btn btn-sm ${!activeDiv ? 'btn-primary' : 'btn-ghost'}`
    allBtn.textContent = '📖 Semua'
    allBtn.onclick = () => { activeDiv = ''; history.pushState(null,'','knowledge.html'); renderTabs(profile); loadContent(profile) }
    el.appendChild(allBtn)
    DIVISIONS.forEach(d => {
      const btn = document.createElement('button')
      btn.className = `btn btn-sm ${activeDiv === d ? 'btn-primary' : 'btn-ghost'}`
      btn.innerHTML = `${DIVISION_META[d].icon} ${DIVISION_META[d].label}`
      btn.onclick = () => { activeDiv = d; history.pushState(null,'',`knowledge.html?div=${d}`); renderTabs(profile); loadContent(profile) }
      el.appendChild(btn)
    })
  }

  async function loadContent(profile) {
    const el = document.getElementById('knowledgeContent')
    const cacheKey = activeDiv || '__all__'
    const divsToShow = activeDiv ? [activeDiv] : DIVISIONS
    // Show cached content immediately — fetch fresh in background
    if (contentCache[cacheKey]) {
      el.innerHTML = contentCache[cacheKey]
      divsToShow.forEach(d => rerenderPriceWrap(d))
    } else {
      el.innerHTML = '<div class="loading">Memuat…</div>'
    }
    const canEdit = profile.role === 'owner' || profile.role === 'cs'
    const canEditModal = profile.role === 'owner' || profile.role === 'data'

    try {
      await dataAuthReady
      // Fetch all knowledge (no orderBy to avoid composite index requirement)
      const snap = await getDocs(query(collection(db,'product_knowledge'), where('division','in', divsToShow.slice(0,30))))
      let allSections = snap.docs.map(x => ({ id: x.id, ...x.data() }))
      allSections.sort((a,b) => (a.orderIndex||0) - (b.orderIndex||0))
      sections = allSections

      // Fetch price lists — semua parallel
      const priceData = {}
      await Promise.all(divsToShow.map(async d => {
        const pSnap = await getDoc(doc(db,'price_list',d))
        if (pSnap.exists()) priceData[d] = pSnap.data()
      }))
      divsToShow.forEach(d => {
        if (!_inlineSaveTimers[d]) {
          priceDataStore[d] = { items: [...(priceData[d]?.items || [])] }
        }
      })

      document.getElementById('pageTitle').textContent = activeDiv ? DIVISION_META[activeDiv]?.label : 'Product Knowledge'

      // Seed prompt if empty
      if (allSections.length === 0 && profile.role === 'owner') {
        el.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📚</div>
            <p>Belum ada konten knowledge</p>
            <button onclick="seedKnowledge()" class="btn btn-primary" style="margin-top:14px">Isi Data Default</button>
          </div>`
        window.seedKnowledge = async () => {
          document.getElementById('knowledgeContent').innerHTML = '<div class="loading">Mengisi data…</div>'
          await doSeed()
          await loadContent(profile)
        }
        return
      }

      const rendered = divsToShow.map(d => {
        const divSections = allSections.filter(s => s.division === d)
        const meta = DIVISION_META[d]
        const prices = priceData[d]?.items || []
        return `
          <div style="margin-bottom:28px" id="div-${d}">
            ${!activeDiv ? `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
              <span style="font-size:22px">${meta.icon}</span>
              <h2 style="font-size:18px;font-weight:800;color:var(--black)">${meta.label}</h2>
            </div>` : ''}

            <!-- Price List -->
            <div class="card" style="margin-bottom:12px;border-left:3px solid var(--green)">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                <h3 style="font-size:14px;font-weight:700;color:var(--green)">💰 Daftar Harga</h3>
                ${canEdit ? `<button onclick="openPriceEdit('${d}')" class="btn btn-ghost btn-sm">Edit Harga</button>` : ''}
              </div>
              <div style="display:flex;gap:8px;margin-bottom:10px;font-size:11px;flex-wrap:wrap">
                <span class="tier-badge tb-normal">● Normal — Staff langsung pakai</span>
                <span class="tier-badge tb-promo">● Promo — Perlu approval Kepala Cabang</span>
                <span class="tier-badge tb-admin">● Admin — Perlu approval Owner (batas bawah)</span>
                ${canEditModal ? `<span class="tier-badge tb-modal">● Modal — Internal</span>` : ''}
              </div>
              <div id="price-wrap-${d}"></div>
            </div>

            <!-- Knowledge sections -->
            ${divSections.map(s => `
              <div class="card" style="margin-bottom:10px" id="sec-${s.id}">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px">
                  <h3 style="font-size:14px;font-weight:700;color:var(--black)">${s.title}</h3>
                  ${canEdit ? `<div style="display:flex;gap:6px;flex-shrink:0">
                    <button onclick="openEdit('${s.id}')" class="btn btn-ghost btn-sm">Edit</button>
                    <button onclick="deleteSection('${s.id}')" class="btn btn-danger btn-sm">Hapus</button>
                  </div>` : ''}
                </div>
                <div style="font-size:13px;line-height:1.75;color:rgba(3,69,67,.8);white-space:pre-wrap">${renderMD(s.content)}</div>
              </div>`).join('')}

            ${canEdit ? `<button onclick="openAdd('${d}')" class="btn btn-ghost btn-sm" style="margin-top:4px">＋ Tambah Konten</button>` : ''}
          </div>`
      }).join('')
      el.innerHTML = rendered
      contentCache[cacheKey] = rendered
      divsToShow.forEach(d => rerenderPriceWrap(d))

    } catch(err) {
      console.error(err)
      el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Gagal memuat: ${err.message}</p></div>`
    }
  }

  function renderMD(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
  }

  // === KONTEN EDIT ===
  window.openEdit = function(id) {
    const s = sections.find(x => x.id === id)
    if (!s) return
    editingDocId = id
    document.getElementById('modalTitle').textContent = 'Edit Konten'
    document.getElementById('modalTitleInput').value = s.title
    document.getElementById('modalContent').value = s.content
    document.getElementById('editModal').style.display = 'flex'
  }

  window.openAdd = function(division) {
    editingDocId = null
    window._addDiv = division
    document.getElementById('modalTitle').textContent = 'Tambah Konten'
    document.getElementById('modalTitleInput').value = ''
    document.getElementById('modalContent').value = ''
    document.getElementById('editModal').style.display = 'flex'
  }

  window.closeModal = () => { document.getElementById('editModal').style.display = 'none' }

  window.saveSection = async function() {
    const btn = document.getElementById('modalSaveBtn')
    btn.disabled=true; btn.textContent='Menyimpan…'
    const title = document.getElementById('modalTitleInput').value.trim()
    const content = document.getElementById('modalContent').value.trim()
    if (!title || !content) { btn.disabled=false; btn.textContent='Simpan'; return }
    try {
      if (editingDocId) {
        await setDoc(doc(db,'product_knowledge',editingDocId), { title, content, updatedAt: Timestamp.now() }, { merge:true })
      } else {
        const divSections = sections.filter(s => s.division===window._addDiv)
        await addDoc(collection(db,'product_knowledge'), {
          division: window._addDiv, title, content,
          orderIndex: divSections.length,
          updatedAt: Timestamp.now(),
        })
      }
      closeModal()
      delete contentCache[activeDiv || '__all__']
      await loadContent(getProfile())
    } finally { btn.disabled=false; btn.textContent='Simpan' }
  }

  window.deleteSection = async function(id) {
    if (!confirm('Hapus konten ini?')) return
    await deleteDoc(doc(db,'product_knowledge',id))
    delete contentCache[activeDiv || '__all__']
    await loadContent(getProfile())
  }

  // === PRICE LIST EDIT ===
  window.openPriceEdit = async function(division) {
    editingPriceDiv = division
    const snap = await getDoc(doc(db,'price_list',division))
    const items = snap.exists() ? snap.data().items || [] : []
    document.getElementById('priceModalTitle').textContent = `Edit Daftar Harga — ${DIVISION_META[division]?.label}`
    renderPriceRows(items)
    document.getElementById('priceModal').style.display = 'flex'
  }

  function renderPriceRows(items) {
    const role = getProfile()?.role
    const canModal = role === 'owner' || role === 'data'
    document.getElementById('priceRows').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(${canModal?4:3},1fr);gap:8px;margin-bottom:8px;padding:8px 12px;background:rgba(3,69,67,.04);border-radius:8px;font-size:11px;font-weight:700">
        <span class="tier-normal">● Harga Normal<br><span style="font-weight:400;font-size:10px">Staff bisa langsung pakai</span></span>
        <span class="tier-promo">● Harga Promo<br><span style="font-weight:400;font-size:10px">Perlu approval Kepala Cabang</span></span>
        <span class="tier-admin">● Harga Admin<br><span style="font-weight:400;font-size:10px">Batas bawah, perlu approval Owner</span></span>
        ${canModal ? `<span class="tier-modal">● Harga Modal<br><span style="font-weight:400;font-size:10px">Internal — tidak ditampilkan ke staff</span></span>` : ''}
      </div>
      ${items.length === 0 ? '<p style="font-size:13px;color:rgba(3,69,67,.35);text-align:center;padding:8px">Belum ada item. Klik "Tambah Baris".</p>' :
      items.map((item, i) => `
        <div style="background:var(--beige-soft);border-radius:10px;padding:12px;margin-bottom:8px;position:relative">
          <button onclick="removePriceRow(${i})" style="position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;font-size:14px;color:rgba(3,69,67,.35)">✕</button>
          <div class="form-group" style="margin-bottom:8px">
            <label style="font-size:11px">Nama Layanan / Produk</label>
            <input type="text" id="price-name-${i}" value="${item.name||''}" oninput="updatePriceRow(${i},'name',this.value);checkModalDupes()" placeholder="cth: Bordir Kecil (s/d 5cm)">
            <div id="dupe-modal-${i}" style="display:none;font-size:10px;color:#d97706;font-weight:600;margin-top:3px">⚠ Nama ini sudah ada di baris lain</div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px">
            <div>
              <label style="font-size:11px;color:#059669;font-weight:700">Harga Normal (Rp)</label>
              <input type="number" value="${item.priceNormal||''}" oninput="updatePriceRow(${i},'priceNormal',this.value)" placeholder="misal: 25000" style="border-color:rgba(5,150,105,.3)">
            </div>
            <div>
              <label style="font-size:11px;color:#d97706;font-weight:700">Harga Promo (Rp)</label>
              <input type="number" value="${item.pricePromo||''}" oninput="updatePriceRow(${i},'pricePromo',this.value)" placeholder="misal: 20000" style="border-color:rgba(217,119,6,.3)">
            </div>
            <div>
              <label style="font-size:11px;color:#b91c1c;font-weight:700">Harga Admin (Rp)</label>
              <input type="number" value="${item.priceAdmin||''}" oninput="updatePriceRow(${i},'priceAdmin',this.value)" placeholder="misal: 15000" style="border-color:rgba(185,28,28,.3)">
            </div>
          </div>
          ${canModal ? `
          <div style="margin-bottom:8px">
            <label style="font-size:11px;color:#7c3aed;font-weight:700">Harga Modal (Rp) — Internal</label>
            <input type="number" value="${item.priceModal||''}" oninput="updatePriceRow(${i},'priceModal',this.value)" placeholder="misal: 10000" style="border-color:rgba(124,58,237,.3)">
          </div>` : ''}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div>
              <label style="font-size:11px">Satuan</label>
              <input type="text" value="${item.unit||''}" oninput="updatePriceRow(${i},'unit',this.value)" placeholder="cth: pcs, set, lembar">
            </div>
            <div>
              <label style="font-size:11px">Keterangan</label>
              <input type="text" value="${item.note||''}" oninput="updatePriceRow(${i},'note',this.value)" placeholder="cth: belum termasuk bahan">
            </div>
          </div>
        </div>`).join('')}
    `
    window._priceItems = [...items]
  }

  window.updatePriceRow = (i, field, val) => { if (window._priceItems) window._priceItems[i][field] = val }

  window.checkModalDupes = function() {
    const items = window._priceItems || []
    const names = items.map(it => (it.name||'').trim().toLowerCase())
    items.forEach((_, i) => {
      const el = document.getElementById(`dupe-modal-${i}`)
      if (!el) return
      const name = names[i]
      el.style.display = (name && names.filter(n => n === name).length > 1) ? '' : 'none'
    })
  }

  window.removePriceRow = (i) => {
    window._priceItems.splice(i, 1)
    renderPriceRows(window._priceItems)
  }

  window.addPriceRow = () => {
    if (!window._priceItems) window._priceItems = []
    window._priceItems.push({ name:'', priceNormal:'', pricePromo:'', priceAdmin:'', priceModal:'', unit:'', note:'' })
    renderPriceRows(window._priceItems)
  }

  window.closePriceModal = () => { document.getElementById('priceModal').style.display = 'none' }

  window.savePriceList = async function() {
    const btn = document.getElementById('priceSaveBtn')
    const items = (window._priceItems||[]).map(item => ({
      name: item.name||'',
      priceNormal: Number(item.priceNormal)||0,
      pricePromo: Number(item.pricePromo)||0,
      priceAdmin: Number(item.priceAdmin)||0,
      priceModal: Number(item.priceModal)||0,
      unit: item.unit||'',
      note: item.note||'',
    })).filter(item => item.name)
    const names = items.map(it => it.name.trim().toLowerCase())
    const dupes = names.filter((n, i) => names.indexOf(n) !== i)
    if (dupes.length) {
      alert(`Ada nama item duplikat: "${dupes[0]}". Harap perbaiki sebelum menyimpan.`)
      return
    }
    btn.disabled=true; btn.textContent='Menyimpan…'
    try {
      await setDoc(doc(db,'price_list',editingPriceDiv), {
        division: editingPriceDiv, items, updatedAt: Timestamp.now()
      })
      closePriceModal()
      delete contentCache[editingPriceDiv || '__all__']
      delete contentCache['__all__']
      await loadContent(getProfile())
    } finally { btn.disabled=false; btn.textContent='Simpan' }
  }

  // === INLINE PRICE EDITING ===
  function escAttr(str) {
    return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;')
  }

  function renderInlinePriceTable(d) {
    const profile = getProfile()
    const canEdit = profile?.role === 'owner' || profile?.role === 'cs'
    const canEditModal = profile?.role === 'owner' || profile?.role === 'data'
    const items = priceDataStore[d]?.items || []

    if (!items.length) {
      return canEdit
        ? `<p style="font-size:13px;color:rgba(3,69,67,.35);margin-bottom:8px">Belum ada daftar harga.</p><button onclick="addInlinePriceRow('${d}')" class="btn btn-ghost btn-sm">＋ Tambah Baris</button>`
        : `<p style="font-size:13px;color:rgba(3,69,67,.35)">Belum ada daftar harga.</p>`
    }

    const rows = items.map((p, i) => canEdit ? `<tr>
      <td><input class="inp-inline" type="text" value="${escAttr(p.name||'')}" onchange="updateInlinePrice('${d}',${i},'name',this.value)" placeholder="Nama produk"></td>
      <td><input class="inp-inline tier-normal" type="number" value="${p.priceNormal||''}" onchange="updateInlinePrice('${d}',${i},'priceNormal',this.value)" placeholder="0"></td>
      <td><input class="inp-inline tier-promo" type="number" value="${p.pricePromo||''}" onchange="updateInlinePrice('${d}',${i},'pricePromo',this.value)" placeholder="0"></td>
      <td><input class="inp-inline tier-admin" type="number" value="${p.priceAdmin||''}" onchange="updateInlinePrice('${d}',${i},'priceAdmin',this.value)" placeholder="0"></td>
      ${canEditModal ? `<td><input class="inp-inline tier-modal" type="number" value="${p.priceModal||''}" onchange="updateInlinePrice('${d}',${i},'priceModal',this.value)" placeholder="0"></td>` : ''}
      <td><input class="inp-inline" type="text" value="${escAttr(p.unit||'')}" onchange="updateInlinePrice('${d}',${i},'unit',this.value)" placeholder="—" style="color:rgba(3,69,67,.5);max-width:70px"></td>
      <td style="white-space:normal;min-width:120px"><input class="inp-inline" type="text" value="${escAttr(p.note||'')}" onchange="updateInlinePrice('${d}',${i},'note',this.value)" placeholder="—" style="color:rgba(3,69,67,.45);font-size:12px"></td>
      <td><button onclick="removeInlinePriceRow('${d}',${i})" style="background:none;border:none;cursor:pointer;color:rgba(3,69,67,.3);font-size:14px;padding:2px 6px" title="Hapus baris">✕</button></td>
    </tr>` : `<tr>
      <td style="font-weight:600;white-space:normal">${escAttr(p.name||'')}</td>
      <td class="tier-normal">${p.priceNormal ? Number(p.priceNormal).toLocaleString('id-ID') : '—'}</td>
      <td class="tier-promo">${p.pricePromo ? Number(p.pricePromo).toLocaleString('id-ID') : '—'}</td>
      <td class="tier-admin">${p.priceAdmin ? Number(p.priceAdmin).toLocaleString('id-ID') : '—'}</td>
      ${canEditModal ? `<td class="tier-modal">${p.priceModal ? Number(p.priceModal).toLocaleString('id-ID') : '—'}</td>` : ''}
      <td style="color:rgba(3,69,67,.5)">${escAttr(p.unit||'—')}</td>
      <td style="color:rgba(3,69,67,.4);font-size:12px;white-space:normal">${escAttr(p.note||'—')}</td>
    </tr>`).join('')

    return `<div style="overflow-x:auto"><table class="price-table">
      <thead><tr>
        <th>LAYANAN / PRODUK</th><th>NORMAL</th><th>PROMO</th><th>ADMIN</th>
        ${canEditModal ? '<th>MODAL</th>' : ''}
        <th>SATUAN</th><th>KETERANGAN</th>${canEdit ? '<th></th>' : ''}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    ${canEdit ? `<button onclick="addInlinePriceRow('${d}')" class="btn btn-ghost btn-sm" style="margin-top:8px">＋ Tambah Baris</button>` : ''}`
  }

  function rerenderPriceWrap(division) {
    const el = document.getElementById(`price-wrap-${division}`)
    if (el) el.innerHTML = renderInlinePriceTable(division)
  }

  window.updateInlinePrice = function(division, index, field, value) {
    const item = priceDataStore[division]?.items?.[index]
    if (!item) return
    item[field] = value
    scheduleInlineSave(division)
  }

  function scheduleInlineSave(division) {
    clearTimeout(_inlineSaveTimers[division])
    _inlineSaveTimers[division] = setTimeout(() => flushInlineSave(division), 1000)
  }

  async function flushInlineSave(division) {
    delete _inlineSaveTimers[division]
    const items = (priceDataStore[division]?.items || [])
      .map(item => ({
        name: String(item.name||'').trim(),
        priceNormal: Number(item.priceNormal)||0,
        pricePromo:  Number(item.pricePromo)||0,
        priceAdmin:  Number(item.priceAdmin)||0,
        priceModal:  Number(item.priceModal)||0,
        unit: String(item.unit||'').trim(),
        note: String(item.note||'').trim(),
      }))
      .filter(item => item.name)
    const names = items.map(it => it.name.toLowerCase())
    if (names.some((n, i) => names.indexOf(n) !== i)) {
      showSavedToast('⚠ Ada nama duplikat — perbaiki sebelum data tersimpan', '#d97706')
      return
    }
    try {
      await setDoc(doc(db,'price_list',division), { division, items, updatedAt: Timestamp.now() })
      delete contentCache[division]
      delete contentCache['__all__']
      showSavedToast()
    } catch(err) { console.error('Gagal simpan harga:', err) }
  }

  window.addInlinePriceRow = function(division) {
    if (!priceDataStore[division]) priceDataStore[division] = { items: [] }
    priceDataStore[division].items.push({ name:'', priceNormal:0, pricePromo:0, priceAdmin:0, priceModal:0, unit:'', note:'' })
    rerenderPriceWrap(division)
    setTimeout(() => {
      const tr = document.querySelector(`#price-wrap-${division} tbody tr:last-child`)
      tr?.querySelector('input')?.focus()
    }, 50)
  }

  window.removeInlinePriceRow = function(division, index) {
    if (!priceDataStore[division]?.items) return
    priceDataStore[division].items.splice(index, 1)
    rerenderPriceWrap(division)
    scheduleInlineSave(division)
  }

  function showSavedToast(msg = '✓ Harga tersimpan', color = '#059669') {
    if (_savedToast) _savedToast.remove()
    const el = document.createElement('div')
    el.style.cssText = `position:fixed;bottom:24px;right:24px;background:${color};color:white;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);pointer-events:none`
    el.textContent = msg
    document.body.appendChild(el)
    _savedToast = el
    setTimeout(() => { el.remove(); if (_savedToast === el) _savedToast = null }, 2500)
  }

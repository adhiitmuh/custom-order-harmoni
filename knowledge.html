<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Knowledge — Harmoni</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .price-table { width:100%; border-collapse:collapse; font-size:13px; }
    .price-table th { text-align:left; padding:8px 10px; font-size:10px; font-weight:700; letter-spacing:.05em; color:rgba(3,69,67,.45); border-bottom:2px solid rgba(3,69,67,.1); }
    .price-table td { padding:8px 10px; border-bottom:1px solid rgba(3,69,67,.06); color:var(--black); }
    .price-table tr:last-child td { border-bottom:none; }
    .price-table tr:hover td { background:rgba(3,69,67,.02); }
    .price-range { font-weight:700; color:var(--green); }
  </style>
</head>
<body>
<div class="layout">
  <nav id="sidebar"></nav>
  <main class="main" style="max-width:860px">
    <div style="margin-bottom:20px">
      <p style="font-size:11px;color:var(--green);opacity:.4;letter-spacing:.06em;margin-bottom:4px">REFERENSI</p>
      <h1 style="font-size:24px;font-weight:800;letter-spacing:-.025em;color:var(--black)" id="pageTitle">Product Knowledge</h1>
    </div>

    <!-- Division tabs -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px" id="divTabs"></div>

    <div id="knowledgeContent"><div class="loading">Memuat…</div></div>
  </main>
</div>

<!-- Edit content modal -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:560px;max-height:80vh;overflow-y:auto">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px" id="modalTitle">Edit Konten</h3>
    <div class="form-group"><label>Judul</label><input type="text" id="modalTitleInput"></div>
    <div class="form-group">
      <label>Konten</label>
      <p style="font-size:11px;color:rgba(3,69,67,.4);margin-bottom:6px">Gunakan **teks** untuk tebal, baris baru untuk paragraf baru</p>
      <textarea id="modalContent" rows="12" style="font-family:monospace;font-size:13px"></textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="closeModal()" class="btn btn-ghost" style="flex:1;justify-content:center">Batal</button>
      <button onclick="saveSection()" class="btn btn-primary" style="flex:1;justify-content:center" id="modalSaveBtn">Simpan</button>
    </div>
  </div>
</div>

<!-- Price list modal -->
<div id="priceModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:680px;max-height:85vh;overflow-y:auto">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px" id="priceModalTitle">Edit Daftar Harga</h3>
    <div id="priceRows" style="margin-bottom:14px"></div>
    <button onclick="addPriceRow()" class="btn btn-ghost btn-sm" style="margin-bottom:14px;width:100%;justify-content:center">＋ Tambah Baris</button>
    <div style="display:flex;gap:8px">
      <button onclick="closePriceModal()" class="btn btn-ghost" style="flex:1;justify-content:center">Batal</button>
      <button onclick="savePriceList()" class="btn btn-primary" style="flex:1;justify-content:center" id="priceSaveBtn">Simpan</button>
    </div>
  </div>
</div>

<script type="module">
  import { db } from './js/config.js'
  import { requireAuth, getProfile } from './js/auth.js'
  import { collection, query, where, getDocs, doc, setDoc, addDoc, deleteDoc, getDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'
  import { DIVISION_META, DIVISIONS } from './js/utils.js'

  const params = new URLSearchParams(location.search)
  let activeDiv = params.get('div') || ''
  let editingDocId = null
  let editingPriceDiv = null
  let sections = []

  requireAuth(async (profile) => {
    renderTabs(profile)
    await loadContent(profile)
  })

  function renderTabs(profile) {
    const el = document.getElementById('divTabs')
    el.innerHTML = ''
    const allBtn = document.createElement('button')
    allBtn.className = `btn btn-sm ${!activeDiv ? 'btn-primary' : 'btn-ghost'}`
    allBtn.textContent = '📖 Semua'
    allBtn.onclick = () => { activeDiv = ''; history.pushState(null,'','knowledge.html'); renderTabs(profile); loadContent(profile) }
    el.appendChild(allBtn)
    DIVISIONS.forEach(d => {
      const btn = document.createElement('button')
      btn.className = `btn btn-sm ${activeDiv === d ? 'btn-primary' : 'btn-ghost'}`
      btn.innerHTML = `${DIVISION_META[d].icon} ${DIVISION_META[d].label}`
      btn.onclick = () => { activeDiv = d; history.pushState(null,'',`knowledge.html?div=${d}`); renderTabs(profile); loadContent(profile) }
      el.appendChild(btn)
    })
  }

  async function loadContent(profile) {
    const el = document.getElementById('knowledgeContent')
    el.innerHTML = '<div class="loading">Memuat…</div>'
    const canEdit = profile.role === 'owner' || profile.role === 'cs'
    const divsToShow = activeDiv ? [activeDiv] : DIVISIONS

    try {
      // Fetch all knowledge (no orderBy to avoid composite index requirement)
      const snap = await getDocs(query(collection(db,'product_knowledge'), where('division','in', divsToShow.slice(0,10))))
      let allSections = snap.docs.map(x => ({ id: x.id, ...x.data() }))
      allSections.sort((a,b) => (a.orderIndex||0) - (b.orderIndex||0))
      sections = allSections

      // Fetch price lists
      const priceData = {}
      for (const d of divsToShow) {
        const pSnap = await getDoc(doc(db,'price_list',d))
        if (pSnap.exists()) priceData[d] = pSnap.data()
      }

      document.getElementById('pageTitle').textContent = activeDiv ? DIVISION_META[activeDiv]?.label : 'Product Knowledge'

      // Seed prompt if empty
      if (allSections.length === 0 && profile.role === 'owner') {
        el.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📚</div>
            <p>Belum ada konten knowledge</p>
            <button onclick="seedKnowledge()" class="btn btn-primary" style="margin-top:14px">Isi Data Default</button>
          </div>`
        window.seedKnowledge = async () => {
          document.getElementById('knowledgeContent').innerHTML = '<div class="loading">Mengisi data…</div>'
          await doSeed()
          await loadContent(profile)
        }
        return
      }

      el.innerHTML = divsToShow.map(d => {
        const divSections = allSections.filter(s => s.division === d)
        const meta = DIVISION_META[d]
        const prices = priceData[d]?.items || []
        return `
          <div style="margin-bottom:28px" id="div-${d}">
            ${!activeDiv ? `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
              <span style="font-size:22px">${meta.icon}</span>
              <h2 style="font-size:18px;font-weight:800;color:var(--black)">${meta.label}</h2>
            </div>` : ''}

            <!-- Price List -->
            <div class="card" style="margin-bottom:12px;border-left:3px solid var(--green)">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                <h3 style="font-size:14px;font-weight:700;color:var(--green)">💰 Daftar Harga</h3>
                ${canEdit ? `<button onclick="openPriceEdit('${d}')" class="btn btn-ghost btn-sm">Edit Harga</button>` : ''}
              </div>
              ${prices.length ? `
                <table class="price-table">
                  <thead><tr>
                    <th>LAYANAN / PRODUK</th>
                    <th>HARGA</th>
                    <th>SATUAN</th>
                    ${prices[0]?.note !== undefined ? '<th>KETERANGAN</th>' : ''}
                  </tr></thead>
                  <tbody>
                    ${prices.map(p => `<tr>
                      <td style="font-weight:600">${p.name}</td>
                      <td class="price-range">${p.priceMin ? (p.priceMax && p.priceMax !== p.priceMin ? `Rp ${Number(p.priceMin).toLocaleString('id-ID')} – ${Number(p.priceMax).toLocaleString('id-ID')}` : `Rp ${Number(p.priceMin).toLocaleString('id-ID')}`) : '—'}</td>
                      <td style="color:rgba(3,69,67,.5)">${p.unit||'—'}</td>
                      ${p.note !== undefined ? `<td style="color:rgba(3,69,67,.5);font-size:12px">${p.note||''}</td>` : ''}
                    </tr>`).join('')}
                  </tbody>
                </table>` :
                `<p style="font-size:13px;color:rgba(3,69,67,.35)">${canEdit ? 'Belum ada daftar harga. Klik "Edit Harga" untuk menambahkan.' : 'Belum ada daftar harga.'}</p>`}
            </div>

            <!-- Knowledge sections -->
            ${divSections.map(s => `
              <div class="card" style="margin-bottom:10px" id="sec-${s.id}">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px">
                  <h3 style="font-size:14px;font-weight:700;color:var(--black)">${s.title}</h3>
                  ${canEdit ? `<div style="display:flex;gap:6px;flex-shrink:0">
                    <button onclick="openEdit('${s.id}')" class="btn btn-ghost btn-sm">Edit</button>
                    <button onclick="deleteSection('${s.id}')" class="btn btn-danger btn-sm">Hapus</button>
                  </div>` : ''}
                </div>
                <div style="font-size:13px;line-height:1.75;color:rgba(3,69,67,.8);white-space:pre-wrap">${renderMD(s.content)}</div>
              </div>`).join('')}

            ${canEdit ? `<button onclick="openAdd('${d}')" class="btn btn-ghost btn-sm" style="margin-top:4px">＋ Tambah Konten</button>` : ''}
          </div>`
      }).join('')

    } catch(err) {
      console.error(err)
      el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Gagal memuat: ${err.message}</p></div>`
    }
  }

  function renderMD(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
  }

  // === KONTEN EDIT ===
  window.openEdit = function(id) {
    const s = sections.find(x => x.id === id)
    if (!s) return
    editingDocId = id
    document.getElementById('modalTitle').textContent = 'Edit Konten'
    document.getElementById('modalTitleInput').value = s.title
    document.getElementById('modalContent').value = s.content
    document.getElementById('editModal').style.display = 'flex'
  }

  window.openAdd = function(division) {
    editingDocId = null
    window._addDiv = division
    document.getElementById('modalTitle').textContent = 'Tambah Konten'
    document.getElementById('modalTitleInput').value = ''
    document.getElementById('modalContent').value = ''
    document.getElementById('editModal').style.display = 'flex'
  }

  window.closeModal = () => { document.getElementById('editModal').style.display = 'none' }

  window.saveSection = async function() {
    const btn = document.getElementById('modalSaveBtn')
    btn.disabled=true; btn.textContent='Menyimpan…'
    const title = document.getElementById('modalTitleInput').value.trim()
    const content = document.getElementById('modalContent').value.trim()
    if (!title || !content) { btn.disabled=false; btn.textContent='Simpan'; return }
    try {
      if (editingDocId) {
        await setDoc(doc(db,'product_knowledge',editingDocId), { title, content, updatedAt: Timestamp.now() }, { merge:true })
      } else {
        const divSections = sections.filter(s => s.division===window._addDiv)
        await addDoc(collection(db,'product_knowledge'), {
          division: window._addDiv, title, content,
          orderIndex: divSections.length,
          updatedAt: Timestamp.now(),
        })
      }
      closeModal()
      await loadContent(getProfile())
    } finally { btn.disabled=false; btn.textContent='Simpan' }
  }

  window.deleteSection = async function(id) {
    if (!confirm('Hapus konten ini?')) return
    await deleteDoc(doc(db,'product_knowledge',id))
    await loadContent(getProfile())
  }

  // === PRICE LIST EDIT ===
  window.openPriceEdit = async function(division) {
    editingPriceDiv = division
    const snap = await getDoc(doc(db,'price_list',division))
    const items = snap.exists() ? snap.data().items || [] : []
    document.getElementById('priceModalTitle').textContent = `Edit Harga — ${DIVISION_META[division]?.label}`
    renderPriceRows(items)
    document.getElementById('priceModal').style.display = 'flex'
  }

  function renderPriceRows(items) {
    document.getElementById('priceRows').innerHTML = items.length === 0
      ? '<p style="font-size:13px;color:rgba(3,69,67,.35);text-align:center;padding:8px">Belum ada item. Klik "Tambah Baris".</p>'
      : items.map((item, i) => `
          <div style="background:var(--beige-soft);border-radius:10px;padding:12px;margin-bottom:8px;position:relative" id="priceRow-${i}">
            <button onclick="removePriceRow(${i})" style="position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;font-size:14px;color:rgba(3,69,67,.35);padding:2px">✕</button>
            <div class="grid-2" style="gap:8px">
              <div class="form-group" style="margin-bottom:6px;grid-column:1/-1">
                <label style="font-size:11px">Nama Layanan / Produk</label>
                <input type="text" value="${item.name||''}" oninput="updatePriceRow(${i},'name',this.value)" placeholder="cth: Bordir Kecil (s/d 5cm)">
              </div>
              <div class="form-group" style="margin-bottom:6px">
                <label style="font-size:11px">Harga Min (Rp)</label>
                <input type="number" value="${item.priceMin||''}" oninput="updatePriceRow(${i},'priceMin',this.value)" placeholder="15000">
              </div>
              <div class="form-group" style="margin-bottom:6px">
                <label style="font-size:11px">Harga Max (Rp) — opsional</label>
                <input type="number" value="${item.priceMax||''}" oninput="updatePriceRow(${i},'priceMax',this.value)" placeholder="25000">
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label style="font-size:11px">Satuan</label>
                <input type="text" value="${item.unit||''}" oninput="updatePriceRow(${i},'unit',this.value)" placeholder="cth: pcs, set, lembar">
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label style="font-size:11px">Keterangan (opsional)</label>
                <input type="text" value="${item.note||''}" oninput="updatePriceRow(${i},'note',this.value)" placeholder="cth: belum termasuk bahan">
              </div>
            </div>
          </div>`).join('')
    window._priceItems = [...items]
  }

  window.updatePriceRow = (i, field, val) => { if (window._priceItems) window._priceItems[i][field] = val }

  window.removePriceRow = (i) => {
    window._priceItems.splice(i, 1)
    renderPriceRows(window._priceItems)
  }

  window.addPriceRow = () => {
    if (!window._priceItems) window._priceItems = []
    window._priceItems.push({ name:'', priceMin:'', priceMax:'', unit:'', note:'' })
    renderPriceRows(window._priceItems)
  }

  window.closePriceModal = () => { document.getElementById('priceModal').style.display = 'none' }

  window.savePriceList = async function() {
    const btn = document.getElementById('priceSaveBtn')
    btn.disabled=true; btn.textContent='Menyimpan…'
    const items = (window._priceItems||[]).map(item => ({
      name: item.name||'',
      priceMin: Number(item.priceMin)||0,
      priceMax: Number(item.priceMax)||0,
      unit: item.unit||'',
      note: item.note||'',
    })).filter(item => item.name)
    try {
      await setDoc(doc(db,'price_list',editingPriceDiv), {
        division: editingPriceDiv, items, updatedAt: Timestamp.now()
      })
      closePriceModal()
      await loadContent(getProfile())
    } finally { btn.disabled=false; btn.textContent='Simpan' }
  }

  // === SEED DATA ===
  async function doSeed() {
    const now = Timestamp.now()
    const data = [
      { division:'bordir', title:'Jenis Layanan Bordir', orderIndex:0, content:`**Bordir Komputer**\nHasil rapi dan konsisten untuk produksi massal. Cocok untuk logo perusahaan, nama, dan desain detail.\n\n**Bordir 3D (Timbul)**\nMemberikan efek timbul pada desain. Premium dan eksklusif.\n\n**Bordir Patch / Emblem**\nBordir diatas kain khusus (twill/kanvas) yang bisa dipasang/dijahit kemudian.` },
      { division:'bordir', title:'Aplikasi & Bahan', orderIndex:1, content:`**Bisa Dibordir Pada:**\n- Kaos, kemeja, polo shirt\n- Jaket (parasut, fleece, bomber)\n- Topi (trucker, baseball, snapback)\n- Tas, ransel, pouch\n- Seragam kerja, sekolah, komunitas\n\n**Ukuran Desain:**\nMaksimal 30x30cm per desain. Untuk logo dada biasanya 8-12cm.` },
      { division:'bordir', title:'Cara Pemesanan', orderIndex:2, content:`1. Kirim desain (JPG/PNG/AI/CDR) resolusi tinggi\n2. Sebutkan bahan/produk yang akan dibordir\n3. Konfirmasi ukuran dan posisi bordir\n4. DP 50% sebelum pengerjaan\n5. Pelunasan saat produk selesai` },
      { division:'papan-nama', title:'Jenis Papan Nama', orderIndex:0, content:`**Papan Nama US (Umum/Standar)**\nTerbuat dari bahan akrilik atau plastik keras. Cocok untuk seragam harian.\n\n**Papan Nama KL (Kulit/Leather)**\nTerbuat dari kulit sintetis atau kulit asli premium. Tampilan elegan dan formal.` },
      { division:'papan-nama', title:'Ukuran & Spesifikasi', orderIndex:1, content:`**Ukuran Standar:**\n- Kecil: 8 x 2 cm\n- Sedang: 10 x 2.5 cm\n- Besar: 12 x 3 cm\n\n**Pemasangan:**\n- Pin belakang (jarum)\n- Magnet\n- Velcro (kait)\n- Dijahit langsung` },
      { division:'konveksi', title:'Jenis Produk', orderIndex:0, content:`**Seragam Kerja & Kantor**\nKemeja, polo shirt, rompi, jaket corporate.\n\n**Seragam Sekolah & Universitas**\nBaju putih, pramuka, jas almamater, batik sekolah.\n\n**Pakaian Komunitas & Event**\nKaos komunitas, jaket organisasi, seragam tim.` },
      { division:'konveksi', title:'Minimum Order & Proses', orderIndex:1, content:`**Minimum Order:**\n- Kaos: 24 pcs/model/warna\n- Kemeja/Polo: 12 pcs/model/warna\n- Jaket: 12 pcs/model/warna\n\n**Alur Produksi:**\n1. Diskusi & konfirmasi desain\n2. Pembuatan sampel (opsional)\n3. Produksi massal\n4. Quality control\n5. Pengiriman` },
      { division:'tailor', title:'Layanan Tailor', orderIndex:0, content:`**Jahit Custom (Dari Kain)**\nBuat pakaian dari nol sesuai desain dan ukuran badan.\n\n**Permak/Alterasi**\nUbah ukuran pakaian yang sudah ada.\n\n**Repair**\nPerbaiki kerusakan: ritsleting, kancing, sobekan.` },
      { division:'jersey', title:'Jenis Jersey', orderIndex:0, content:`**Jersey Futsal:** Model V-neck/O-neck, dryfit. Termasuk jersey + celana.\n**Jersey Basket:** Model sleeveless, bahan mesh atau dryfit.\n**Jersey Voli/Badminton:** Model polo/V-neck, ringan menyerap keringat.\n**Jersey Running/Cycling:** Model sporty, potongan ergonomis.\n**Jersey Komunitas/Esports:** Desain bebas.` },
      { division:'jersey', title:'Teknik & Customisasi', orderIndex:1, content:`**Sublimasi (Full Print)**\nWarna cerah, tahan lama, bisa full warna/gradasi.\n\n**Customisasi:**\n- Nama pemain di punggung\n- Nomor punggung & dada\n- Logo club/sponsor\n- Warna sesuai keinginan` },
      { division:'sablon', title:'Teknik Sablon', orderIndex:0, content:`**Sablon Manual (Rubber/Plastisol)**\nCocok untuk order 12+ pcs dengan 1-4 warna.\n\n**DTF (Direct to Film)**\nCetak digital, cocok untuk desain detail, bisa dari 1 pcs.\n\n**DTG (Direct to Garment)**\nCetak langsung ke kain, cocok untuk kaos putih/terang.\n\n**Vinyl / Polyflex**\nCocok untuk huruf/angka besar.` },
      { division:'jilbab', title:'Jenis Jilbab', orderIndex:0, content:`**Jilbab Segiempat:** Klasik serba guna. Ukuran standar 110x110cm.\n**Jilbab Pashmina:** Model memanjang, formal dan casual. 75x185cm.\n**Jilbab Instan/Bergo:** Langsung pakai, cocok untuk seragam.\n**Jilbab Seragam Komunitas:** Desain custom sesuai identitas.` },
      { division:'jilbab', title:'Pilihan Bahan', orderIndex:1, content:`**Voal/Voile:** Premium, jatuh, anti-kusut.\n**Ceruti:** Lembut, tipis, nyaman.\n**Satin:** Berkilau, elegan untuk pesta.\n**Jersey:** Lembut, melar, untuk olahraga.\n**Katun Ima/Paris:** Adem, menyerap keringat.\n**Wolfis/Woolpeach:** Tebal, tidak menerawang.` },
      { division:'butik', title:'Koleksi Butik', orderIndex:0, content:`**Gaun & Dress Pesta:** Berbagai model untuk pernikahan, wisuda, acara formal.\n**Kebaya Modern:** Sentuhan kontemporer untuk pernikahan dan formal.\n**Busana Muslim/Gamis:** Gamis, tunik, set busana muslim elegan.\n**Jas & Blazer Formal:** Untuk acara resmi dan corporate.\n**Baju Pengantin Custom:** Sesuai konsep pernikahan.` },
      { division:'butik', title:'Proses Pemesanan', orderIndex:1, content:`1. Konsultasi desain & pilih model referensi\n2. Pengambilan ukuran (datang langsung atau kirim ukuran)\n3. Pilih bahan (bawa sendiri atau dari koleksi kami)\n4. DP 50% untuk mulai pengerjaan\n5. Fitting setelah pola jadi (opsional)\n6. Finishing, quality check, pelunasan\n\n*Pesan minimal 1 bulan sebelum acara*` },
      { division:'pin-logam', title:'Jenis Pin Logam', orderIndex:0, content:`**Pin Cor (Die Casting):** Detail tajam, cocok untuk logo kompleks.\n**Pin Stamping:** Press dari plat logam, ekonomis untuk jumlah besar.\n**Pin Etching:** Diukir dengan asam, elegan dan premium.\n**Pin Soft Enamel:** Cekungan diisi cat warna, tahan lama.\n**Pin Hard Enamel:** Permukaan rata mengkilap, kualitas tertinggi.` },
      { division:'pin-logam', title:'Material & Finishing', orderIndex:1, content:`**Material:** Zinc Alloy, Brass/Kuningan, Stainless Steel, Iron\n\n**Finishing:** Gold plating, Silver plating, Antique gold/silver, Matte/Glossy, Epoxy coating\n\n**Ukuran Umum:** 2x2cm, 3x3cm, 4x5cm, custom sesuai permintaan` },
      { division:'pin-fiber', title:'Jenis Pin Fiber / Akrilik', orderIndex:0, content:`**Pin Akrilik UV Print:** Desain dicetak langsung, warna tajam dan detail.\n**Pin Akrilik Cutting:** Dipotong sesuai bentuk desain.\n**Pin Akrilik Glitter:** Efek sparkle, cocok untuk merchandise premium.\n**Pin Resin:** Dari resin epoxy dengan elemen dekoratif.\n**Pin Karet/Rubber:** Lembut, fleksibel, aman untuk anak.` },
      { division:'pin-fiber', title:'Spesifikasi', orderIndex:1, content:`**Ketebalan:** Akrilik 3mm (standar), 5mm (premium)\n\n**Jenis Kait:** Peniti standar, Magnet, Safety pin, Gantungan kunci\n\n**Ukuran:** Mini 2x2cm, Standar 4x4cm, Besar 6x6cm, Custom\n\n**Keunggulan:** Full color tanpa batas warna, ringan, tidak mudah patah` },

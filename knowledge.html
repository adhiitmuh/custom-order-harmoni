<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Knowledge — Harmoni</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .price-table { table-layout:fixed; width:max-content; min-width:100%; border-collapse:collapse; font-size:13px; }
    .price-table th { position:relative; text-align:left; padding:8px 6px; font-size:10px; font-weight:700; letter-spacing:.05em; color:rgba(3,69,67,.45); border-bottom:2px solid rgba(3,69,67,.1); white-space:nowrap; overflow:hidden; user-select:none; }
    .price-table th:first-child { padding-left:10px; }
    .price-table td { padding:9px 6px; border-bottom:1px solid rgba(3,69,67,.06); color:var(--black); vertical-align:middle; white-space:nowrap; overflow:hidden; }
    .price-table td:first-child { white-space:normal; padding-left:10px; }
    .price-table tr:last-child td { border-bottom:none; }
    .price-table tr:hover td { background:rgba(3,69,67,.02); }
    .col-resize { position:absolute; right:0; top:0; width:6px; height:100%; cursor:col-resize; z-index:2; background:transparent; border-radius:3px; transition:background .15s; }
    .col-resize:hover, .col-resize.active { background:rgba(3,69,67,.25); }
    .tier-normal { font-weight:700; color:#059669; }
    .tier-promo  { font-weight:700; color:#d97706; }
    .tier-admin  { font-weight:700; color:#b91c1c; }
    .tier-badge { display:inline-flex; align-items:center; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:700; margin-left:4px; }
    .tb-normal { background:#dcfce7; color:#166534; }
    .tb-promo  { background:#fef3c7; color:#92400e; }
    .tb-admin  { background:#fee2e2; color:#991b1b; }
    .tier-modal { font-weight:700; color:#7c3aed; }
    .drag-handle-icon { cursor:grab; color:rgba(3,69,67,.2); font-size:14px; vertical-align:middle; margin-right:4px; display:inline-block; user-select:none; }
    .drag-handle-icon:hover { color:rgba(3,69,67,.5); }
    .price-table tr.drag-over > td { background:rgba(3,69,67,.07) !important; outline:1px dashed rgba(3,69,67,.25); }
    .price-table tr.drag-dragging { opacity:0.35; }
    .tb-modal  { background:#ede9fe; color:#4c1d95; }
    .inp-inline {
      border: none; background: transparent; font-size: 13px;
      font-weight: inherit; color: inherit; width: 100%; outline: none;
      padding: 2px 0; cursor: pointer;
      border-bottom: 1.5px dashed transparent; transition: border-color .15s;
    }
    .inp-inline:hover { border-bottom-color: rgba(3,69,67,.25); }
    .inp-inline:focus { border-bottom-color: currentColor; cursor: text; }
    .inp-inline::placeholder { color: rgba(3,69,67,.2); font-weight: 400; }
    .inp-inline[type=number]::-webkit-inner-spin-button,
    .inp-inline[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .inp-inline[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
<div class="layout">
  <nav id="sidebar"></nav>
  <main class="main">
    <div style="margin-bottom:20px">
      <p style="font-size:11px;color:var(--green);opacity:.4;letter-spacing:.06em;margin-bottom:4px">REFERENSI</p>
      <h1 style="font-size:24px;font-weight:800;letter-spacing:-.025em;color:var(--black)" id="pageTitle">Product Knowledge</h1>
    </div>

    <!-- Division tabs -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px" id="divTabs"></div>

    <div id="knowledgeContent"><div class="loading">Memuat…</div></div>
  </main>
</div>

<!-- Edit content modal -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:560px;max-height:80vh;overflow-y:auto">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px" id="modalTitle">Edit Konten</h3>
    <div class="form-group"><label>Judul</label><input type="text" id="modalTitleInput"></div>
    <div class="form-group">
      <label>Konten</label>
      <p style="font-size:11px;color:rgba(3,69,67,.4);margin-bottom:6px">Gunakan **teks** untuk tebal, baris baru untuk paragraf baru</p>
      <textarea id="modalContent" rows="12" style="font-family:monospace;font-size:13px"></textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="closeModal()" class="btn btn-ghost" style="flex:1;justify-content:center">Batal</button>
      <button onclick="saveSection()" class="btn btn-primary" style="flex:1;justify-content:center" id="modalSaveBtn">Simpan</button>
    </div>
  </div>
</div>

<!-- Price list modal -->
<div id="priceModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:680px;max-height:85vh;overflow-y:auto">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px" id="priceModalTitle">Edit Daftar Harga</h3>
    <div id="priceRows" style="margin-bottom:14px"></div>
    <div style="display:flex;gap:8px">
      <button onclick="closePriceModal()" class="btn btn-ghost" style="flex:1;justify-content:center">Batal</button>
      <button onclick="saveSingleItem()" class="btn btn-primary" style="flex:1;justify-content:center" id="priceSaveBtn">Simpan</button>
    </div>
  </div>
</div>

<script type="module">
  import { db } from './js/config.js'
  import { requireAuth, getProfile, dataAuthReady, getActiveDivisions } from './js/auth.js'
  import { collection, query, where, getDocs, doc, setDoc, addDoc, deleteDoc, getDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'
  import { DIVISION_META, DIVISIONS } from './js/utils.js'

  const params = new URLSearchParams(location.search)
  let activeDiv = params.get('div') || ''
  let editingDocId = null
  let editingPriceDiv = null
  let editingItemIndex = -1
  let sections = []
  const contentCache = {}
  let priceDataStore = {}
  let _inlineSaveTimers = {}
  let _savedToast = null
  requireAuth(async (profile) => {
    await renderTabs(profile)
    loadContent(profile)
  })

  async function renderTabs(profile) {
    const el = document.getElementById('divTabs')
    el.innerHTML = ''
    const allBtn = document.createElement('button')
    allBtn.className = `btn btn-sm ${!activeDiv ? 'btn-primary' : 'btn-ghost'}`
    allBtn.textContent = '📖 Semua'
    allBtn.onclick = () => { activeDiv = ''; history.pushState(null,'','knowledge.html'); renderTabs(profile); loadContent(profile) }
    el.appendChild(allBtn)
    const divs = await getActiveDivisions()
    divs.forEach(d => {
      const btn = document.createElement('button')
      btn.className = `btn btn-sm ${activeDiv === d.key ? 'btn-primary' : 'btn-ghost'}`
      btn.innerHTML = `${d.icon} ${d.label}`
      btn.onclick = () => { activeDiv = d.key; history.pushState(null,'',`knowledge.html?div=${d.key}`); renderTabs(profile); loadContent(profile) }
      el.appendChild(btn)
    })
  }

  async function loadContent(profile) {
    const el = document.getElementById('knowledgeContent')
    const cacheKey = activeDiv || '__all__'
    const activeDivs = await getActiveDivisions()
    const divsToShow = activeDiv ? [activeDiv] : activeDivs.map(d => d.key)
    // Show cached content immediately — fetch fresh in background
    if (contentCache[cacheKey]) {
      el.innerHTML = contentCache[cacheKey]
      divsToShow.forEach(d => rerenderPriceWrap(d))
    } else {
      el.innerHTML = '<div class="loading">Memuat…</div>'
    }
    const canEdit = profile.role === 'owner' || profile.role === 'cs'
    const canEditModal = profile.role === 'owner' || profile.role === 'data'

    try {
      await dataAuthReady
      // Fetch all knowledge (no orderBy to avoid composite index requirement)
      const snap = await getDocs(query(collection(db,'product_knowledge'), where('division','in', divsToShow.slice(0,30))))
      let allSections = snap.docs.map(x => ({ id: x.id, ...x.data() }))
      allSections.sort((a,b) => (a.orderIndex||0) - (b.orderIndex||0))
      sections = allSections

      // Fetch price lists — semua parallel
      const priceData = {}
      await Promise.all(divsToShow.map(async d => {
        const pSnap = await getDoc(doc(db,'price_list',d))
        if (pSnap.exists()) priceData[d] = pSnap.data()
      }))
      divsToShow.forEach(d => {
        if (!_inlineSaveTimers[d]) {
          priceDataStore[d] = { items: [...(priceData[d]?.items || [])] }
        }
      })

      const activeDivMeta = activeDivs.find(d => d.key === activeDiv)
      document.getElementById('pageTitle').textContent = activeDiv ? (activeDivMeta?.label || activeDiv) : 'Product Knowledge'

      // Seed prompt if empty
      if (allSections.length === 0 && profile.role === 'owner') {
        el.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📚</div>
            <p>Belum ada konten knowledge</p>
            <button onclick="seedKnowledge()" class="btn btn-primary" style="margin-top:14px">Isi Data Default</button>
          </div>`
        window.seedKnowledge = async () => {
          document.getElementById('knowledgeContent').innerHTML = '<div class="loading">Mengisi data…</div>'
          await doSeed()
          await loadContent(profile)
        }
        return
      }

      const rendered = divsToShow.map(d => {
        const divSections = allSections.filter(s => s.division === d)
        const meta = activeDivs.find(x => x.key === d) || DIVISION_META[d] || { icon: '📦', label: d }
        const prices = priceData[d]?.items || []
        return `
          <div style="margin-bottom:28px" id="div-${d}">
            ${!activeDiv ? `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
              <span style="font-size:22px">${meta.icon}</span>
              <h2 style="font-size:18px;font-weight:800;color:var(--black)">${meta.label}</h2>
            </div>` : ''}

            <!-- Price List -->
            <div class="card" style="margin-bottom:12px;border-left:3px solid var(--green)">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                <h3 style="font-size:14px;font-weight:700;color:var(--green)">💰 Daftar Harga</h3>
                ${canEdit ? `<button onclick="openSingleItemEdit('${d}',-1)" class="btn btn-ghost btn-sm">＋ Tambah Item</button>` : ''}
              </div>
              <div style="display:flex;gap:8px;margin-bottom:10px;font-size:11px;flex-wrap:wrap">
                <span class="tier-badge tb-normal">● Normal — Staff langsung pakai</span>
                <span class="tier-badge tb-promo">● Promo — Perlu approval Kepala Cabang</span>
                <span class="tier-badge tb-admin">● Owner — Perlu approval Owner (batas bawah)</span>
                ${canEditModal ? `<span class="tier-badge tb-modal">● Modal — Internal</span>` : ''}
              </div>
              <div id="price-wrap-${d}"></div>
            </div>

            <!-- Knowledge sections -->
            ${divSections.map(s => `
              <div class="card" style="margin-bottom:10px" id="sec-${s.id}">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px">
                  <h3 style="font-size:14px;font-weight:700;color:var(--black)">${s.title}</h3>
                  ${canEdit ? `<div style="display:flex;gap:6px;flex-shrink:0">
                    <button onclick="openEdit('${s.id}')" class="btn btn-ghost btn-sm">Edit</button>
                    <button onclick="deleteSection('${s.id}')" class="btn btn-danger btn-sm">Hapus</button>
                  </div>` : ''}
                </div>
                <div style="font-size:13px;line-height:1.75;color:rgba(3,69,67,.8);white-space:pre-wrap">${renderMD(s.content)}</div>
              </div>`).join('')}

            ${canEdit ? `<button onclick="openAdd('${d}')" class="btn btn-ghost btn-sm" style="margin-top:4px">＋ Tambah Konten</button>` : ''}
          </div>`
      }).join('')
      el.innerHTML = rendered
      contentCache[cacheKey] = rendered
      divsToShow.forEach(d => rerenderPriceWrap(d))

    } catch(err) {
      console.error(err)
      el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Gagal memuat: ${err.message}</p></div>`
    }
  }

  function renderMD(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
  }

  // === KONTEN EDIT ===
  window.openEdit = function(id) {
    const s = sections.find(x => x.id === id)
    if (!s) return
    editingDocId = id
    document.getElementById('modalTitle').textContent = 'Edit Konten'
    document.getElementById('modalTitleInput').value = s.title
    document.getElementById('modalContent').value = s.content
    document.getElementById('editModal').style.display = 'flex'
  }

  window.openAdd = function(division) {
    editingDocId = null
    window._addDiv = division
    document.getElementById('modalTitle').textContent = 'Tambah Konten'
    document.getElementById('modalTitleInput').value = ''
    document.getElementById('modalContent').value = ''
    document.getElementById('editModal').style.display = 'flex'
  }

  window.closeModal = () => { document.getElementById('editModal').style.display = 'none' }

  window.saveSection = async function() {
    const btn = document.getElementById('modalSaveBtn')
    btn.disabled=true; btn.textContent='Menyimpan…'
    const title = document.getElementById('modalTitleInput').value.trim()
    const content = document.getElementById('modalContent').value.trim()
    if (!title || !content) { btn.disabled=false; btn.textContent='Simpan'; return }
    try {
      if (editingDocId) {
        await setDoc(doc(db,'product_knowledge',editingDocId), { title, content, updatedAt: Timestamp.now() }, { merge:true })
      } else {
        const divSections = sections.filter(s => s.division===window._addDiv)
        await addDoc(collection(db,'product_knowledge'), {
          division: window._addDiv, title, content,
          orderIndex: divSections.length,
          updatedAt: Timestamp.now(),
        })
      }
      closeModal()
      delete contentCache[activeDiv || '__all__']
      await loadContent(getProfile())
    } finally { btn.disabled=false; btn.textContent='Simpan' }
  }

  window.deleteSection = async function(id) {
    if (!confirm('Hapus konten ini?')) return
    await deleteDoc(doc(db,'product_knowledge',id))
    delete contentCache[activeDiv || '__all__']
    await loadContent(getProfile())
  }

  // === PRICE LIST EDIT ===
  window.openPriceEdit = async function(division) {
    editingPriceDiv = division
    const snap = await getDoc(doc(db,'price_list',division))
    const items = snap.exists() ? snap.data().items || [] : []
    const divMeta = (await getActiveDivisions()).find(d => d.key === division) || DIVISION_META[division]
    document.getElementById('priceModalTitle').textContent = `Edit Daftar Harga — ${divMeta?.label || division}`
    renderPriceRows(items)
    document.getElementById('priceModal').style.display = 'flex'
  }

  function renderPriceRows(items) {
    const role = getProfile()?.role
    const canModal = role === 'owner' || role === 'data'
    document.getElementById('priceRows').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(${canModal?4:3},1fr);gap:8px;margin-bottom:8px;padding:8px 12px;background:rgba(3,69,67,.04);border-radius:8px;font-size:11px;font-weight:700">
        <span class="tier-normal">● Harga Normal<br><span style="font-weight:400;font-size:10px">Staff bisa langsung pakai</span></span>
        <span class="tier-promo">● Harga Promo<br><span style="font-weight:400;font-size:10px">Perlu approval Kepala Cabang</span></span>
        <span class="tier-admin">● Harga Owner<br><span style="font-weight:400;font-size:10px">Batas bawah, perlu approval Owner</span></span>
        ${canModal ? `<span class="tier-modal">● Harga Modal<br><span style="font-weight:400;font-size:10px">Internal — tidak ditampilkan ke staff</span></span>` : ''}
      </div>
      ${items.length === 0 ? '<p style="font-size:13px;color:rgba(3,69,67,.35);text-align:center;padding:8px">Belum ada item. Klik "Tambah Baris".</p>' :
      items.map((item, i) => `
        <div style="background:var(--beige-soft);border-radius:10px;padding:12px;margin-bottom:8px;position:relative">
          <button onclick="removePriceRow(${i})" style="position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;font-size:14px;color:rgba(3,69,67,.35)">✕</button>
          <div class="form-group" style="margin-bottom:8px">
            <label style="font-size:11px">Nama Layanan / Produk</label>
            <input type="text" id="price-name-${i}" value="${item.name||''}" oninput="updatePriceRow(${i},'name',this.value);checkModalDupes()" placeholder="cth: Bordir Kecil (s/d 5cm)">
            <div id="dupe-modal-${i}" style="display:none;font-size:10px;color:#d97706;font-weight:600;margin-top:3px">⚠ Nama ini sudah ada di baris lain</div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px">
            <div>
              <label style="font-size:11px;color:#059669;font-weight:700">Harga Normal (Rp)</label>
              <input type="text" inputmode="numeric" value="${fmtPrice(item.priceNormal)}" oninput="this.value=fmtInputPrice(this.value);updatePriceRow(${i},'priceNormal',this.value)" placeholder="misal: 25.000" style="border-color:rgba(5,150,105,.3)">
            </div>
            <div>
              <label style="font-size:11px;color:#d97706;font-weight:700">Harga Promo (Rp)</label>
              <input type="text" inputmode="numeric" value="${fmtPrice(item.pricePromo)}" oninput="this.value=fmtInputPrice(this.value);updatePriceRow(${i},'pricePromo',this.value)" placeholder="misal: 20.000" style="border-color:rgba(217,119,6,.3)">
            </div>
            <div>
              <label style="font-size:11px;color:#b91c1c;font-weight:700">Harga Owner (Rp)</label>
              <input type="text" inputmode="numeric" value="${fmtPrice(item.priceAdmin)}" oninput="this.value=fmtInputPrice(this.value);updatePriceRow(${i},'priceAdmin',this.value)" placeholder="misal: 15.000" style="border-color:rgba(185,28,28,.3)">
            </div>
          </div>
          ${canModal ? `
          <div style="margin-bottom:8px">
            <label style="font-size:11px;color:#7c3aed;font-weight:700">Harga Modal (Rp) — Internal</label>
            <input type="text" inputmode="numeric" value="${fmtPrice(item.priceModal)}" oninput="this.value=fmtInputPrice(this.value);updatePriceRow(${i},'priceModal',this.value)" placeholder="misal: 10.000" style="border-color:rgba(124,58,237,.3)">
          </div>` : ''}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div>
              <label style="font-size:11px">Satuan</label>
              <input type="text" value="${item.unit||''}" oninput="updatePriceRow(${i},'unit',this.value)" placeholder="cth: pcs, set, lembar">
            </div>
            <div>
              <label style="font-size:11px">Keterangan</label>
              <input type="text" value="${item.note||''}" oninput="updatePriceRow(${i},'note',this.value)" placeholder="cth: belum termasuk bahan">
            </div>
          </div>
          <div style="margin-top:10px;border-top:1px dashed rgba(3,69,67,.15);padding-top:10px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
              <span style="font-size:11px;font-weight:700;color:rgba(3,69,67,.45)">VARIAN <span style="font-weight:400;font-size:10px">(opsional — beda bahan/tipe dengan harga berbeda)</span></span>
              <button type="button" onclick="addVariant(${i})" style="background:none;border:1.5px dashed rgba(3,69,67,.2);border-radius:6px;padding:2px 10px;font-size:11px;cursor:pointer;color:rgba(3,69,67,.55)">+ Tambah Varian</button>
            </div>
            <div id="modal-vwrap-${i}">
              ${(item.variants||[]).map((v, vi) => variantModalRowHTML(i, vi, v, canModal)).join('')}
            </div>
            ${!(item.variants||[]).length ? `<p style="font-size:11px;color:rgba(3,69,67,.3);font-style:italic;margin:0">Kosong — harga pakai field di atas</p>` : `<p style="font-size:10px;color:rgba(3,69,67,.4);margin:4px 0 0">ℹ Jika ada varian, harga di atas diabaikan di katalog</p>`}
          </div>
        </div>`).join('')}
    `
    window._priceItems = [...items]
  }

  function variantModalRowHTML(itemIdx, varIdx, v, canModal) {
    const e = s => String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    return `<div style="background:rgba(3,69,67,.04);border-radius:8px;padding:8px 10px;margin-bottom:6px;display:grid;grid-template-columns:1.5fr repeat(${canModal?4:3},1fr) 28px;gap:6px;align-items:end">
      <div>
        <label style="font-size:10px;font-weight:700;color:rgba(3,69,67,.5);display:block;margin-bottom:3px">NAMA VARIAN</label>
        <input type="text" value="${e(v.name)}" oninput="updateVariant(${itemIdx},${varIdx},'name',this.value)" placeholder="cth: Dryfit, Hyget" style="width:100%;border:1.5px solid rgba(3,69,67,.15);border-radius:6px;padding:5px 8px;font-size:12px;outline:none">
      </div>
      <div>
        <label style="font-size:10px;font-weight:700;color:#059669;display:block;margin-bottom:3px">NORMAL</label>
        <input type="text" inputmode="numeric" value="${fmtPrice(v.priceNormal)}" oninput="this.value=fmtInputPrice(this.value);updateVariant(${itemIdx},${varIdx},'priceNormal',this.value)" placeholder="0" style="width:100%;border:1.5px solid rgba(5,150,105,.3);border-radius:6px;padding:5px 8px;font-size:12px;outline:none">
      </div>
      <div>
        <label style="font-size:10px;font-weight:700;color:#d97706;display:block;margin-bottom:3px">PROMO</label>
        <input type="text" inputmode="numeric" value="${fmtPrice(v.pricePromo)}" oninput="this.value=fmtInputPrice(this.value);updateVariant(${itemIdx},${varIdx},'pricePromo',this.value)" placeholder="0" style="width:100%;border:1.5px solid rgba(217,119,6,.3);border-radius:6px;padding:5px 8px;font-size:12px;outline:none">
      </div>
      <div>
        <label style="font-size:10px;font-weight:700;color:#b91c1c;display:block;margin-bottom:3px">ADMIN</label>
        <input type="text" inputmode="numeric" value="${fmtPrice(v.priceAdmin)}" oninput="this.value=fmtInputPrice(this.value);updateVariant(${itemIdx},${varIdx},'priceAdmin',this.value)" placeholder="0" style="width:100%;border:1.5px solid rgba(185,28,28,.3);border-radius:6px;padding:5px 8px;font-size:12px;outline:none">
      </div>
      ${canModal ? `<div>
        <label style="font-size:10px;font-weight:700;color:#7c3aed;display:block;margin-bottom:3px">MODAL</label>
        <input type="text" inputmode="numeric" value="${fmtPrice(v.priceModal)}" oninput="this.value=fmtInputPrice(this.value);updateVariant(${itemIdx},${varIdx},'priceModal',this.value)" placeholder="0" style="width:100%;border:1.5px solid rgba(124,58,237,.3);border-radius:6px;padding:5px 8px;font-size:12px;outline:none">
      </div>` : ''}
      <div style="display:flex;align-items:flex-end;padding-bottom:4px">
        <button type="button" onclick="removeVariant(${itemIdx},${varIdx})" style="background:none;border:none;cursor:pointer;color:rgba(3,69,67,.3);font-size:14px;padding:3px;line-height:1" title="Hapus varian">✕</button>
      </div>
    </div>`
  }

  const _priceFields = ['priceNormal','pricePromo','priceAdmin','priceModal']
  window.updatePriceRow = (i, field, val) => {
    if (!window._priceItems) return
    window._priceItems[i][field] = _priceFields.includes(field)
      ? Number(String(val).replace(/\./g,''))||0
      : val
  }

  window.addVariant = function(itemIdx) {
    if (!window._priceItems?.[itemIdx]) return
    if (!window._priceItems[itemIdx].variants) window._priceItems[itemIdx].variants = []
    window._priceItems[itemIdx].variants.push({ name: '', priceNormal: 0, pricePromo: 0, priceAdmin: 0, priceModal: 0 })
    renderPriceRows(window._priceItems)
  }

  window.removeVariant = function(itemIdx, varIdx) {
    if (!window._priceItems?.[itemIdx]?.variants) return
    window._priceItems[itemIdx].variants.splice(varIdx, 1)
    renderPriceRows(window._priceItems)
  }

  window.updateVariant = function(itemIdx, varIdx, field, val) {
    const v = window._priceItems?.[itemIdx]?.variants?.[varIdx]
    if (!v) return
    v[field] = _priceFields.includes(field) ? Number(String(val).replace(/\./g,''))||0 : val
  }

  window.checkModalDupes = function() {
    const items = window._priceItems || []
    const names = items.map(it => (it.name||'').trim().toLowerCase())
    items.forEach((_, i) => {
      const el = document.getElementById(`dupe-modal-${i}`)
      if (!el) return
      const name = names[i]
      el.style.display = (name && names.filter(n => n === name).length > 1) ? '' : 'none'
    })
  }

  window.removePriceRow = (i) => {
    window._priceItems.splice(i, 1)
    renderPriceRows(window._priceItems)
  }

  window.addPriceRow = () => {
    if (!window._priceItems) window._priceItems = []
    window._priceItems.push({ name:'', priceNormal:'', pricePromo:'', priceAdmin:'', priceModal:'', unit:'', note:'' })
    renderPriceRows(window._priceItems)
  }

  window.closePriceModal = () => { document.getElementById('priceModal').style.display = 'none' }

  window.openSingleItemEdit = async function(division, itemIndex) {
    editingPriceDiv = division
    editingItemIndex = itemIndex
    const items = priceDataStore[division]?.items || []
    const item = itemIndex >= 0
      ? JSON.parse(JSON.stringify(items[itemIndex]))
      : { name:'', priceNormal:0, pricePromo:0, priceAdmin:0, priceModal:0, unit:'', note:'', variants:[] }
    const divMeta = (await getActiveDivisions()).find(d => d.key === division) || DIVISION_META[division]
    document.getElementById('priceModalTitle').textContent = itemIndex >= 0
      ? `Edit Item — ${item.name || divMeta?.label || division}`
      : `Tambah Item — ${divMeta?.label || division}`
    renderPriceRows([item])
    document.getElementById('priceModal').style.display = 'flex'
  }

  window.saveSingleItem = async function() {
    const btn = document.getElementById('priceSaveBtn')
    const edited = window._priceItems?.[0]
    if (!edited?.name?.trim()) { alert('Nama item harus diisi'); return }
    const newItem = {
      name: edited.name.trim(),
      priceNormal: Number(edited.priceNormal)||0,
      pricePromo: Number(edited.pricePromo)||0,
      priceAdmin: Number(edited.priceAdmin)||0,
      priceModal: Number(edited.priceModal)||0,
      unit: String(edited.unit||'').trim(),
      note: String(edited.note||'').trim(),
      variants: (edited.variants||[]).filter(v=>v.name).map(v=>({
        name: String(v.name).trim(),
        priceNormal: Number(v.priceNormal)||0,
        pricePromo: Number(v.pricePromo)||0,
        priceAdmin: Number(v.priceAdmin)||0,
        priceModal: Number(v.priceModal)||0,
      })),
    }
    if (!priceDataStore[editingPriceDiv]) priceDataStore[editingPriceDiv] = { items: [] }
    const items = [...(priceDataStore[editingPriceDiv].items || [])]
    if (editingItemIndex >= 0) {
      items[editingItemIndex] = newItem
    } else {
      items.push(newItem)
    }
    btn.disabled = true; btn.textContent = 'Menyimpan…'
    try {
      await setDoc(doc(db,'price_list',editingPriceDiv), { division: editingPriceDiv, items, updatedAt: Timestamp.now() })
      priceDataStore[editingPriceDiv].items = items
      closePriceModal()
      delete contentCache[editingPriceDiv]
      delete contentCache['__all__']
      rerenderPriceWrap(editingPriceDiv)
      showSavedToast(`✓ Item "${newItem.name}" tersimpan`)
    } finally { btn.disabled = false; btn.textContent = 'Simpan' }
  }

  window.savePriceList = async function() {
    const btn = document.getElementById('priceSaveBtn')
    const items = (window._priceItems||[]).map(item => ({
      name: item.name||'',
      priceNormal: Number(item.priceNormal)||0,
      pricePromo: Number(item.pricePromo)||0,
      priceAdmin: Number(item.priceAdmin)||0,
      priceModal: Number(item.priceModal)||0,
      unit: item.unit||'',
      note: item.note||'',
      variants: (item.variants||[]).filter(v => v.name).map(v => ({
        name: String(v.name).trim(),
        priceNormal: Number(v.priceNormal)||0,
        pricePromo: Number(v.pricePromo)||0,
        priceAdmin: Number(v.priceAdmin)||0,
        priceModal: Number(v.priceModal)||0,
      })),
    })).filter(item => item.name)
    const names = items.map(it => it.name.trim().toLowerCase())
    const dupes = names.filter((n, i) => names.indexOf(n) !== i)
    if (dupes.length) {
      alert(`Ada nama item duplikat: "${dupes[0]}". Harap perbaiki sebelum menyimpan.`)
      return
    }
    btn.disabled=true; btn.textContent='Menyimpan…'
    try {
      await setDoc(doc(db,'price_list',editingPriceDiv), {
        division: editingPriceDiv, items, updatedAt: Timestamp.now()
      })
      closePriceModal()
      delete contentCache[editingPriceDiv || '__all__']
      delete contentCache['__all__']
      await loadContent(getProfile())
    } finally { btn.disabled=false; btn.textContent='Simpan' }
  }

  // === INLINE PRICE EDITING ===
  function escAttr(str) {
    return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;')
  }

  function fmtPrice(n) {
    const num = Number(String(n||'').replace(/\./g,''))
    return num > 0 ? num.toLocaleString('id-ID') : ''
  }
  window.fmtInputPrice = function(val) {
    const digits = String(val).replace(/\D/g,'')
    return digits ? Number(digits).toLocaleString('id-ID') : ''
  }

      const variantRows = p.variants.map((v, vi) => canEdit ? `<tr style="background:rgba(3,69,67,.012)">

        <td><input class="inp-inline tier-normal" type="text" inputmode="numeric" value="${fmtPrice(v.priceNormal)}" oninput="this.value=fmtInputPrice(this.value)" onchange="updateInlineVariant('${d}',${i},${vi},'priceNormal',this.value)" placeholder="0"></td>
        <td><input class="inp-inline tier-promo" type="text" inputmode="numeric" value="${fmtPrice(v.pricePromo)}" oninput="this.value=fmtInputPrice(this.value)" onchange="updateInlineVariant('${d}',${i},${vi},'pricePromo',this.value)" placeholder="0"></td>

        ${canEditModal ? `<td><input class="inp-inline tier-modal" type="text" inputmode="numeric" value="${fmtPrice(v.priceModal)}" oninput="this.value=fmtInputPrice(this.value)" onchange="updateInlineVariant('${d}',${i},${vi},'priceModal',this.value)" placeholder="0"></td>` : ''}
        <td></td><td></td>

        <td style="padding-left:16px;border-left:2px solid rgba(3,69,67,.08)"></td>
        <td style="font-size:12px;color:rgba(3,69,67,.7);font-weight:500;white-space:normal">${escAttr(v.name||'')}</td>
        <td class="tier-normal">${v.priceNormal ? Number(v.priceNormal).toLocaleString('id-ID') : '—'}</td>

    return `<div style="overflow-x:auto"><table class="price-table">

  function rerenderPriceWrap(division) {
    const el = document.getElementById(`price-wrap-${division}`)
    if (!el) return
    el.innerHTML = renderInlinePriceTable(division)
    const tbl = el.querySelector('.price-table')
    initResizableTable(tbl)
    initDragSort(tbl, division)
  }

  function initDragSort(tbl, division) {
    if (!tbl) return
    let dragSrcIdx = null
    tbl.querySelectorAll('tr[data-item-index]').forEach(tr => {
      tr.addEventListener('dragstart', e => {
        dragSrcIdx = parseInt(tr.dataset.itemIndex)
        e.dataTransfer.effectAllowed = 'move'
        e.dataTransfer.setData('text/plain', String(dragSrcIdx))
        setTimeout(() => tr.classList.add('drag-dragging'), 0)
      })
      tr.addEventListener('dragend', () => {
        tr.classList.remove('drag-dragging')
        tbl.querySelectorAll('tr.drag-over').forEach(r => r.classList.remove('drag-over'))
        dragSrcIdx = null
      })
      tr.addEventListener('dragover', e => {
        e.preventDefault()
        e.dataTransfer.dropEffect = 'move'
        const toIdx = parseInt(tr.dataset.itemIndex)
        if (toIdx === dragSrcIdx) return
        tbl.querySelectorAll('tr.drag-over').forEach(r => r.classList.remove('drag-over'))
        tr.classList.add('drag-over')
      })
      tr.addEventListener('drop', async e => {
        e.preventDefault()
        e.stopPropagation()
        const toIdx = parseInt(tr.dataset.itemIndex)
        if (dragSrcIdx == null || dragSrcIdx === toIdx) return
        const items = priceDataStore[division]?.items
        if (!items) return
        const [moved] = items.splice(dragSrcIdx, 1)
        items.splice(toIdx, 0, moved)
        rerenderPriceWrap(division)
        try {
          await setDoc(doc(db, 'price_list', division), { items, updatedAt: new Date() }, { merge: true })
        } catch(err) { console.error(err) }
      })
    })
  }

  function initResizableTable(tbl) {
    if (!tbl) return
    tbl.querySelectorAll('thead th').forEach(th => {
      const h = document.createElement('div')
      h.className = 'col-resize'
      h.title = 'Seret untuk ubah lebar kolom'
      th.appendChild(h)
      let x0, w0
      h.addEventListener('mousedown', e => {
        x0 = e.clientX; w0 = th.offsetWidth
        h.classList.add('active')
        e.preventDefault(); e.stopPropagation()
        const mv = e => {
          const minW = parseInt(th.style.minWidth) || 40
          th.style.width = Math.max(minW, w0 + e.clientX - x0) + 'px'
        }
        const up = () => {
          h.classList.remove('active')
          document.removeEventListener('mousemove', mv)
          document.removeEventListener('mouseup', up)
        }
        document.addEventListener('mousemove', mv)
        document.addEventListener('mouseup', up)
      })
    })
  }

  window.updateInlinePrice = function(division, index, field, value) {
    const item = priceDataStore[division]?.items?.[index]
    if (!item) return
    item[field] = _priceFields.includes(field) ? Number(String(value).replace(/\./g,''))||0 : value
    scheduleInlineSave(division)
  }

  function scheduleInlineSave(division) {
    clearTimeout(_inlineSaveTimers[division])
    _inlineSaveTimers[division] = setTimeout(() => flushInlineSave(division), 1000)
  }

  async function flushInlineSave(division) {
    delete _inlineSaveTimers[division]
    const items = (priceDataStore[division]?.items || [])
      .map(item => ({
        name: String(item.name||'').trim(),
        priceNormal: Number(item.priceNormal)||0,
        pricePromo:  Number(item.pricePromo)||0,
        priceAdmin:  Number(item.priceAdmin)||0,
        priceModal:  Number(item.priceModal)||0,
        unit: String(item.unit||'').trim(),
        note: String(item.note||'').trim(),
        variants: (item.variants||[]).filter(v => v.name).map(v => ({
          name: String(v.name).trim(),
          priceNormal: Number(v.priceNormal)||0,
          pricePromo: Number(v.pricePromo)||0,
          priceAdmin: Number(v.priceAdmin)||0,
          priceModal: Number(v.priceModal)||0,
        })),
      }))
      .filter(item => item.name)
    const names = items.map(it => it.name.toLowerCase())
    if (names.some((n, i) => names.indexOf(n) !== i)) {
      showSavedToast('⚠ Ada nama duplikat — perbaiki sebelum data tersimpan', '#d97706')
      return
    }
    try {
      await setDoc(doc(db,'price_list',division), { division, items, updatedAt: Timestamp.now() })
      delete contentCache[division]
      delete contentCache['__all__']
      showSavedToast()
    } catch(err) { console.error('Gagal simpan harga:', err) }
  }

  window.addInlinePriceRow = function(division) {
    if (!priceDataStore[division]) priceDataStore[division] = { items: [] }
    priceDataStore[division].items.push({ name:'', priceNormal:0, pricePromo:0, priceAdmin:0, priceModal:0, unit:'', note:'', variants:[] })
    rerenderPriceWrap(division)
    setTimeout(() => {
      const tr = document.querySelector(`#price-wrap-${division} tbody tr:last-child`)
      tr?.querySelector('input')?.focus()
    }, 50)
  }

  window.removeInlinePriceRow = function(division, index) {
    if (!priceDataStore[division]?.items) return
    priceDataStore[division].items.splice(index, 1)
    rerenderPriceWrap(division)
    scheduleInlineSave(division)
  }

  window.updateInlineVariant = function(division, itemIdx, varIdx, field, value) {
    const item = priceDataStore[division]?.items?.[itemIdx]
    if (!item?.variants?.[varIdx]) return
    item.variants[varIdx][field] = _priceFields.includes(field) ? Number(String(value).replace(/\./g,''))||0 : value
    scheduleInlineSave(division)
  }

  window.removeInlineVariant = function(division, itemIdx, varIdx) {
    const item = priceDataStore[division]?.items?.[itemIdx]
    if (!item?.variants) return
    item.variants.splice(varIdx, 1)
    rerenderPriceWrap(division)
    scheduleInlineSave(division)
  }

  window.addInlineVariant = function(division, itemIdx) {
    const item = priceDataStore[division]?.items?.[itemIdx]
    if (!item) return
    if (!item.variants) item.variants = []
    item.variants.push({ name: '', priceNormal: 0, pricePromo: 0, priceAdmin: 0, priceModal: 0 })
    rerenderPriceWrap(division)
    scheduleInlineSave(division)
  }

  function showSavedToast(msg = '✓ Harga tersimpan', color = '#059669') {
    if (_savedToast) _savedToast.remove()
    const el = document.createElement('div')
    el.style.cssText = `position:fixed;bottom:24px;right:24px;background:${color};color:white;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);pointer-events:none`
    el.textContent = msg
    document.body.appendChild(el)
    _savedToast = el
    setTimeout(() => { el.remove(); if (_savedToast === el) _savedToast = null }, 2500)
  }

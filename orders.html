<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semua Order — Harmoni</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <nav id="sidebar"></nav>
  <main class="main">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px">
      <div>
        <p style="font-size:11px;color:var(--green);opacity:.4;letter-spacing:.06em;margin-bottom:4px">PESANAN</p>
        <h1 style="font-size:24px;font-weight:800;letter-spacing:-.025em;color:var(--black)">Semua Order</h1>
        <p id="orderCount" style="font-size:12px;color:rgba(3,69,67,.4);margin-top:3px;font-family:monospace">—</p>
      </div>
      <a href="new-order.html" class="btn btn-primary no-print" id="newOrderBtn" style="display:none">＋ Order Baru</a>
    </div>

    <!-- Filter -->
    <div class="card no-print" style="margin-bottom:16px;padding:14px 16px">
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <input id="searchInput" placeholder="🔍 Cari nama / no. order…" style="flex:1 1 180px;border-radius:999px;padding:8px 14px;font-size:13px">
        <select id="divFilter" style="flex:0 0 auto;border-radius:999px;padding:8px 12px;font-size:13px">
          <option value="">Semua Divisi</option>
        </select>
        <span id="divLockBadge" style="display:none;align-items:center;gap:6px;padding:6px 12px;background:rgba(3,69,67,.07);border-radius:999px;font-size:12px;font-weight:600;color:var(--green)"></span>
        <select id="branchFilter" style="display:none;flex:0 0 auto;border-radius:999px;padding:8px 12px;font-size:13px">
          <option value="">Semua Cabang</option>
        </select>
        <span id="branchLockBadge" style="display:none;align-items:center;gap:6px;padding:6px 12px;background:rgba(3,69,67,.07);border-radius:999px;font-size:12px;font-weight:600;color:var(--green)"></span>
        <select id="statusFilter" style="flex:0 0 auto;border-radius:999px;padding:8px 12px;font-size:13px">
          <option value="">Semua Status</option>
          <option value="pending">Menunggu Konfirmasi</option>
          <option value="in-progress">Sedang Dikerjakan</option>
          <option value="quality-check">Quality Check</option>
          <option value="done">Selesai</option>
          <option value="delivered">Sudah Dikirim</option>
          <option value="cancelled">Dibatalkan</option>
        </select>
        <select id="payFilter" style="flex:0 0 auto;border-radius:999px;padding:8px 12px;font-size:13px">
          <option value="">Semua Pembayaran</option>
          <option value="belum">Belum Bayar</option>
          <option value="dp">DP</option>
          <option value="lunas">Lunas</option>
        </select>
        <button id="resetBtn" class="btn btn-ghost btn-sm" style="display:none">Reset</button>
      </div>
    </div>

    <div id="orderList"><div class="loading">Memuat…</div></div>
  </main>
</div>

<script type="module">
  import { db } from './js/config.js'
  import { requireAuth, getProfile, dataAuthReady } from './js/auth.js'
  import { collection, query, orderBy, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'
  import { DIVISION_META, DIVISIONS, STATUS_LABEL, STATUS_CLASS, fmtCurrency, daysDiff, paymentStatus } from './js/utils.js'

  let allOrders = []

  // Populate division filter
  const divSel = document.getElementById('divFilter')
  DIVISIONS.forEach(d => {
    const opt = document.createElement('option')
    opt.value = d; opt.textContent = DIVISION_META[d].label
    divSel.appendChild(opt)
  })

  let lockedDivision = null
  let lockedBranch = null

  requireAuth((profile) => {
    if (profile.role !== 'production') document.getElementById('newOrderBtn').style.display = ''

    if (profile.role === 'production' && profile.division) {
      lockedDivision = profile.division
      const meta = DIVISION_META[lockedDivision] || {}
      const badge = document.getElementById('divLockBadge')
      badge.innerHTML = `${meta.icon||''} ${meta.label||lockedDivision}`
      badge.style.display = 'inline-flex'
      document.getElementById('divFilter').style.display = 'none'
    }

    if ((profile.role === 'manager' || profile.role === 'cs') && profile.branch) {
      lockedBranch = profile.branch
      const badge = document.getElementById('branchLockBadge')
      badge.innerHTML = `📍 ${profile.branch}`
      badge.style.display = 'inline-flex'
    }

    if (profile.role === 'owner') document.getElementById('branchFilter').style.display = ''

    // Wire up filters immediately (allOrders starts empty, fills when fetch returns)
    ;['searchInput','divFilter','branchFilter','statusFilter','payFilter'].forEach(id =>
      document.getElementById(id).addEventListener('input', render)
    )
    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('searchInput').value = ''
      if (!lockedDivision) document.getElementById('divFilter').value = ''
      if (!lockedBranch) document.getElementById('branchFilter').value = ''
      document.getElementById('statusFilter').value = ''
      document.getElementById('payFilter').value = ''
      render()
    })

    // Timeout fallback — kalau 10 detik masih loading, minta refresh
    const loadTimeout = setTimeout(() => {
      const el = document.getElementById('orderList')
      if (el && el.querySelector('.loading')) {
        el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Koneksi lambat atau perlu refresh.<br><a href="" onclick="location.reload();return false" style="color:var(--green);font-weight:600">↻ Refresh halaman</a></p></div>`
      }
    }, 10000)

    // Tunggu dataAuth siap sebelum query Firestore (defensive: fallback jika undefined)
    ;(dataAuthReady || Promise.resolve()).then(() =>
    getDocs(query(collection(db, 'orders'), orderBy('createdAt', 'desc')))).catch(err => {
      clearTimeout(loadTimeout)
      document.getElementById('orderList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Gagal memuat order: ${err.message}<br><a href="" onclick="location.reload();return false" style="color:var(--green);font-weight:600">↻ Coba refresh</a></p></div>`
    }).then(snap => { if (!snap) return
      clearTimeout(loadTimeout)
      allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      if (profile.role === 'owner') {
        const branches = [...new Set(allOrders.map(o => o.branch).filter(Boolean))].sort()
        const sel = document.getElementById('branchFilter')
        branches.forEach(b => {
          const opt = document.createElement('option')
          opt.value = b; opt.textContent = `📍 ${b}`
          sel.appendChild(opt)
        })
      }
      render()
    })
  })

  function render() {
    const search = document.getElementById('searchInput').value.toLowerCase()
    const div = document.getElementById('divFilter').value
    const status = document.getElementById('statusFilter').value
    const pay = document.getElementById('payFilter').value
    const isFiltered = search || div || status || pay
    document.getElementById('resetBtn').style.display = isFiltered ? '' : 'none'

    const profile = getProfile()
    const showContact = profile?.role === 'owner'

    const branch = document.getElementById('branchFilter').value

    const filtered = allOrders.filter(o => {
      if (search && !o.customerName?.toLowerCase().includes(search) && !o.orderNumber?.toLowerCase().includes(search)) return false
      const divCheck = lockedDivision || div
      if (divCheck && o.division !== divCheck) return false
      const branchCheck = lockedBranch || branch
      if (branchCheck && o.branch !== branchCheck) return false
      if (status && o.status !== status) return false
      if (pay) {
        const total = o.totalPrice||0, paid = o.depositPaid||0
        if (pay==='belum' && !(total>0 && paid===0)) return false
        if (pay==='dp' && !(paid>0 && paid<total)) return false
        if (pay==='lunas' && !(total>0 && paid>=total)) return false
      }
      return true
    })

    document.getElementById('orderCount').textContent = `${filtered.length} order ${isFiltered?'ditemukan':'total'}`

    const el = document.getElementById('orderList')
    if (!filtered.length) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>Tidak ada order ditemukan</p></div>`
      return
    }

    el.innerHTML = filtered.map(o => {
      const meta = DIVISION_META[o.division] || {}
      const dLeft = daysDiff(o.dueDate)
      const isLate = dLeft < 0 && !['done','delivered','cancelled'].includes(o.status)
      const isUrgent = dLeft >= 0 && dLeft <= 1 && !['done','delivered','cancelled'].includes(o.status)
      const pStatus = paymentStatus(o.totalPrice, o.depositPaid)
      const sisa = (o.totalPrice||0) - (o.depositPaid||0)
      const borderColor = isLate ? 'rgba(239,68,68,.2)' : isUrgent ? 'rgba(245,158,11,.25)' : 'rgba(3,69,67,.08)'

      return `<a href="order.html?id=${o.id}" style="display:block;text-decoration:none;background:var(--white);border-radius:14px;border:1px solid ${borderColor};margin-bottom:8px;overflow:hidden;transition:box-shadow .12s" onmouseover="this.style.boxShadow='0 2px 12px rgba(3,69,67,.08)'" onmouseout="this.style.boxShadow=''">
        <div style="padding:14px 16px">
          <div style="display:flex;align-items:flex-start;gap:12px">
            <div style="width:44px;height:44px;border-radius:12px;background:var(--beige-soft);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${meta.icon||'📦'}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">
                <span class="mono" style="font-size:10px;color:rgba(3,69,67,.4)">${o.orderNumber||''}</span>
                <span class="badge ${STATUS_CLASS[o.status]}">${STATUS_LABEL[o.status]}</span>
                <span style="font-size:11px;color:rgba(3,69,67,.4)">${meta.label||''}</span>
                ${o.sumberOrder && o.sumberOrder !== 'staff' ? `<span style="font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;background:#ede9fe;color:#7c3aed">${o.sumberOrder==='wa_bot'?'🤖 WA Bot':o.sumberOrder==='walk_in'?'🚶 Walk In':o.sumberOrder==='instagram'?'📸 IG':o.sumberOrder==='shopee'?'🛒 Shopee':o.sumberOrder}</span>` : ''}
                ${showContact && o.branch ? `<span style="font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;background:rgba(3,69,67,.07);color:rgba(3,69,67,.6)">📍 ${o.branch}</span>` : ''}
              </div>
              <div style="font-weight:700;font-size:15px;color:var(--black);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.customerName}</div>
              ${showContact && o.customerContact ? `<div style="font-size:12px;color:rgba(3,69,67,.45);font-family:monospace;margin-top:1px">${o.customerContact}</div>` : ''}
            </div>
            <div style="text-align:right;flex-shrink:0;font-size:11px;font-weight:700;color:${isLate?'#b91c1c':isUrgent?'#92400e':'rgba(3,69,67,.4)'}">
              ${isLate?`⚠ ${Math.abs(dLeft)}h terlambat`:dLeft===0?'⏰ Hari ini':`${dLeft} hari lagi`}
              <div style="font-weight:400;opacity:.6;font-size:10px;margin-top:2px">${o.dueDate ? new Date(o.dueDate.toDate ? o.dueDate.toDate() : o.dueDate).toLocaleDateString('id-ID',{day:'numeric',month:'short'}) : ''}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:16px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(3,69,67,.06)">
            <div style="flex:1;display:flex;align-items:center;gap:8px">
              <div class="progress-track" style="flex:1;max-width:120px">
                <div class="progress-fill" style="width:${o.progressPercentage||0}%"></div>
              </div>
              <span class="mono" style="font-size:11px;font-weight:600;color:var(--green);opacity:.7">${o.progressPercentage||0}%</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;text-align:right;font-size:12px">
              ${pStatus ? `<span class="badge badge-pill ${pStatus.cls}">${pStatus.label}</span>` : ''}
              <div>
                <div style="font-weight:700;color:var(--black)">${fmtCurrency(o.totalPrice)}</div>
                ${sisa>0&&o.totalPrice>0?`<div style="color:#b91c1c;font-weight:600;font-size:11px">sisa ${fmtCurrency(sisa)}</div>`:''}
              </div>
            </div>
          </div>
        </div>
      </a>`
    }).join('')
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Harmoni</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <nav id="sidebar"></nav>
  <main class="main">
    <div style="margin-bottom:24px">
      <p style="font-size:11px;color:var(--green);opacity:.4;letter-spacing:.06em;margin-bottom:4px">MENU</p>
      <h1 style="font-size:24px;font-weight:800;letter-spacing:-.025em;color:var(--black)">Dashboard</h1>
    </div>

    <!-- Stats -->
    <div class="grid-3" style="margin-bottom:20px" id="statsGrid">
      <div class="card" style="text-align:center"><div class="loading">…</div></div>
      <div class="card" style="text-align:center"><div class="loading">…</div></div>
      <div class="card" style="text-align:center"><div class="loading">…</div></div>
    </div>

    <!-- Approval alerts -->
    <div id="approvalAlerts" style="margin-bottom:4px"></div>

    <!-- Target omzet -->
    <div class="card" id="targetCard" style="margin-bottom:20px"><div class="loading">…</div></div>

    <!-- Notifikasi ringkasan -->
    <div id="notifSummary" style="margin-bottom:20px"></div>

    <!-- Recent orders -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h2 style="font-size:15px;font-weight:700">Order Terbaru</h2>
        <a href="orders.html" class="btn btn-ghost btn-sm">Lihat Semua</a>
      </div>
      <div id="recentOrders"><div class="loading">Memuat…</div></div>
    </div>
  </main>
</div>

<script type="module">
  import { db } from './js/config.js'
  import { requireAuth, getProfile, dataAuthReady } from './js/auth.js'
  import { collection, query, orderBy, limit, getDocs, doc, getDoc, setDoc, where, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'
  import { DIVISION_META, STATUS_LABEL, STATUS_CLASS, fmtCurrency, paymentStatus, daysDiff } from './js/utils.js'

  requireAuth((profile) => {
    loadStats(profile)
    loadRecent()
    loadNotifSummary(profile)
  })

  async function loadNotifSummary(profile) {
    const el = document.getElementById('notifSummary')
    if (!el) return

    // Unread customer chat
    let unreadChatQ = query(collection(db, 'orders'), where('unreadCustomerChat', '>', 0))
    const chatSnap = await getDocs(unreadChatQ).catch(() => null)
    let unreadOrders = chatSnap ? chatSnap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(o => {
        if (profile.role === 'owner') return true
        if (profile.divisions?.length) return profile.divisions.includes(o.division)
        return !o.lokasiId || o.lokasiId === profile.lokasiId
      }) : []

    // Unread mentions
    const mentionSnap = await getDoc(doc(db, 'user_mentions', profile.id)).catch(() => null)
    const mentionCount = mentionSnap?.exists() ? (mentionSnap.data().unreadMentions || 0) : 0

    const items = []
    if (unreadOrders.length > 0) {
      items.push(`
        <a href="orders.html" style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-radius:10px;border:1.5px solid rgba(239,68,68,.2);text-decoration:none;flex:1;min-width:0">
          <span style="font-size:20px">💬</span>
          <div>
            <div style="font-size:13px;font-weight:700;color:#b91c1c">${unreadOrders.length} order ada pesan baru</div>
            <div style="font-size:11px;color:rgba(3,69,67,.5);margin-top:1px">Pesan customer belum dibalas</div>
          </div>
        </a>`)
    }
    if (mentionCount > 0) {
      items.push(`
        <a href="inbox.html" style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-radius:10px;border:1.5px solid rgba(251,191,36,.3);text-decoration:none;flex:1;min-width:0">
          <span style="font-size:20px">🔔</span>
          <div>
            <div style="font-size:13px;font-weight:700;color:#92400e">${mentionCount} mention belum dibaca</div>
            <div style="font-size:11px;color:rgba(3,69,67,.5);margin-top:1px">Seseorang menyebut kamu di chat</div>
          </div>
        </a>`)
    }

    el.innerHTML = items.length
      ? `<div style="display:flex;gap:10px;flex-wrap:wrap">${items.join('')}</div>`
      : ''
  }

  async function loadStats(profile) {
    await dataAuthReady
    const [ordersSnap, targetSnap] = await Promise.all([
      getDocs(collection(db, 'orders')),
      getDoc(doc(db, 'settings', 'monthly_target'))
    ])
    const orders = ordersSnap.docs.map(d => ({ id: d.id, ...d.data() }))
    const active = orders.filter(o => !['done','delivered','cancelled','pending-approval'].includes(o.status))
    const pendingPromo  = orders.filter(o => o.priceApprovalStatus==='pending' && o.priceApprovalTier==='promo')
    const pendingAdmin  = orders.filter(o => o.priceApprovalStatus==='pending' && o.priceApprovalTier==='admin')
    const pendingModal  = orders.filter(o => o.modalApprovalStatus==='pending')
    const unpaid = orders.filter(o => (o.totalPrice||0) > 0 && (o.depositPaid||0) < (o.totalPrice||0) && o.status !== 'cancelled')

    // Omzet bulan ini
    const now = new Date()
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1)
    const monthOrders = orders.filter(o => {
      if (o.status === 'cancelled') return false
      const d = o.createdAt?.toDate ? o.createdAt.toDate() : new Date(o.createdAt)
      return d >= monthStart
    })
    const omzetBulan = monthOrders.reduce((s,o) => s + (o.totalPrice||0), 0)
    const target = targetSnap.exists() ? targetSnap.data().amount : 0
    const pct = target > 0 ? Math.min(Math.round((omzetBulan/target)*100), 100) : 0

    document.getElementById('statsGrid').innerHTML = `
      <div class="card" style="text-align:center">
        <div style="font-size:32px;font-weight:800;color:var(--green)">${orders.length}</div>
        <div style="font-size:12px;color:rgba(3,69,67,.5);margin-top:4px">Total Order</div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-size:32px;font-weight:800;color:#1e40af">${active.length}</div>
        <div style="font-size:12px;color:rgba(3,69,67,.5);margin-top:4px">Sedang Berjalan</div>
      </div>
      <div class="card" style="text-align:center">
        <div style="font-size:32px;font-weight:800;color:#b91c1c">${unpaid.length}</div>
        <div style="font-size:12px;color:rgba(3,69,67,.5);margin-top:4px">Belum Lunas</div>
      </div>`

    // Approval alerts
    const canApprovePromo = profile.role==='manager'||profile.role==='owner'
    const canApproveAdmin = profile.role==='owner'
    const alertHtml = [
      canApprovePromo && pendingPromo.length > 0 ? `
        <div style="background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px">
          <div><div style="font-weight:700;font-size:14px;color:#d97706">⚠ ${pendingPromo.length} order menunggu approval Harga Promo</div>
          <div style="font-size:12px;color:rgba(3,69,67,.5);margin-top:2px">Perlu disetujui oleh Kepala Cabang</div></div>
          <a href="orders.html?approval=promo" class="btn btn-sm" style="background:#d97706;color:white;border:none;flex-shrink:0">Lihat</a>
        </div>` : '',
      canApproveAdmin && pendingAdmin.length > 0 ? `
        <div style="background:#fff1f2;border:1.5px solid #fecdd3;border-radius:12px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px">
          <div><div style="font-weight:700;font-size:14px;color:#b91c1c">🔒 ${pendingAdmin.length} order menunggu approval Harga Admin</div>
          <div style="font-size:12px;color:rgba(3,69,67,.5);margin-top:2px">Hanya Owner yang dapat menyetujui</div></div>
          <a href="orders.html?approval=admin" class="btn btn-sm" style="background:#b91c1c;color:white;border:none;flex-shrink:0">Lihat</a>
        </div>` : '',
      canApproveAdmin && pendingModal.length > 0 ? `
        <div style="background:#fff7ed;border:1.5px solid #fed7aa;border-radius:12px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px">
          <div><div style="font-weight:700;font-size:14px;color:#c2410c">⏳ ${pendingModal.length} order menunggu approval Harga Modal</div>
          <div style="font-size:12px;color:rgba(3,69,67,.5);margin-top:2px">Data entry sudah mengajukan — perlu disetujui Owner</div></div>
          <a href="orders.html" class="btn btn-sm" style="background:#c2410c;color:white;border:none;flex-shrink:0">Lihat</a>
        </div>` : '',
    ].filter(Boolean).join('')
    if (alertHtml) {
      document.getElementById('approvalAlerts').innerHTML = alertHtml
    }

    // Target omzet card
    const targetCard = document.getElementById('targetCard')
    targetCard.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h2 style="font-size:14px;font-weight:700">🎯 Target Omzet Bulan Ini</h2>
        ${profile.role==='owner' ? `<button onclick="editTarget()" class="btn btn-ghost btn-sm" id="targetEditBtn">${target?'Edit':'Set Target'}</button>` : ''}
      </div>
      <div id="targetView">
        ${target ? `
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
            <span style="font-weight:700;color:var(--green);font-size:16px">${fmtCurrency(omzetBulan)}</span>
            <span style="color:rgba(3,69,67,.5)">dari ${fmtCurrency(target)}</span>
          </div>
          <div class="progress-track" style="height:12px;margin-bottom:6px">
            <div class="progress-fill" style="width:${pct}%;background:${pct>=100?'#059669':pct>=70?'var(--green)':'#f59e0b'};transition:width 1s"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:rgba(3,69,67,.5)">
            <span>${pct}% tercapai · ${monthOrders.length} order bulan ini</span>
            <span style="font-weight:700;color:${pct>=100?'#059669':'#b91c1c'}">${pct>=100?'✅ Target tercapai!':'kurang '+fmtCurrency(target-omzetBulan)}</span>
          </div>` :
          `<p style="font-size:13px;color:rgba(3,69,67,.4);text-align:center;padding:8px 0">Belum ada target bulan ini</p>`}
      </div>
      <div id="targetEditForm" style="display:none">
        <label style="font-size:12px;font-weight:600;color:rgba(3,69,67,.5);display:block;margin-bottom:6px">Target Omzet (Rp)</label>
        <div style="display:flex;gap:8px">
          <input type="number" id="targetInput" value="${target||''}" placeholder="Contoh: 50000000" style="flex:1;padding:8px 12px;border-radius:8px;border:1.5px solid rgba(3,69,67,.15);font-size:14px">
          <button onclick="saveTarget()" class="btn btn-primary btn-sm" id="saveTargetBtn">Simpan</button>
          <button onclick="cancelTarget()" class="btn btn-ghost btn-sm">Batal</button>
        </div>
      </div>`

    window.editTarget = () => {
      document.getElementById('targetView').style.display = 'none'
      document.getElementById('targetEditForm').style.display = ''
      document.getElementById('targetEditBtn').style.display = 'none'
    }
    window.cancelTarget = () => {
      document.getElementById('targetView').style.display = ''
      document.getElementById('targetEditForm').style.display = 'none'
      document.getElementById('targetEditBtn').style.display = ''
    }
    window.saveTarget = async () => {
      const btn = document.getElementById('saveTargetBtn')
      btn.disabled=true; btn.textContent='Menyimpan…'
      const amount = Number(document.getElementById('targetInput').value)||0
      await setDoc(doc(db,'settings','monthly_target'), { amount, updatedAt: new Date().toISOString() })
      await loadStats(getProfile())
      btn.disabled=false; btn.textContent='Simpan'
    }
  }

  async function loadRecent() {
    await dataAuthReady
    const el = document.getElementById('recentOrders')
    let snap
    try { snap = await getDocs(query(collection(db, 'orders'), orderBy('createdAt', 'desc'), limit(8))) }
    catch(err) { el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Gagal memuat: ${err.message}</p></div>`; return }

    if (snap.empty) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>Belum ada order</p></div>`
      return
    }

    el.innerHTML = snap.docs.map(d => {
      const o = { id: d.id, ...d.data() }
      const meta = DIVISION_META[o.division] || {}
      const dLeft = daysDiff(o.dueDate)
      const isLate = dLeft < 0 && !['done','delivered','cancelled'].includes(o.status)
      const pStatus = paymentStatus(o.totalPrice, o.depositPaid)
      const sisa = (o.totalPrice || 0) - (o.depositPaid || 0)

      return `<a href="order.html?id=${o.id}" style="display:block;text-decoration:none;padding:12px;border-radius:10px;border:1px solid rgba(3,69,67,.07);margin-bottom:8px;transition:background .1s" onmouseover="this.style.background='#f8f7f0'" onmouseout="this.style.background=''">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:38px;height:38px;border-radius:10px;background:var(--beige-soft);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${meta.icon||'📦'}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px">
              <span class="mono" style="font-size:10px;color:rgba(3,69,67,.4)">${o.orderNumber}</span>
              <span class="badge ${STATUS_CLASS[o.status]}">${STATUS_LABEL[o.status]}</span>
              ${pStatus ? `<span class="badge badge-pill ${pStatus.cls}">${pStatus.label}</span>` : ''}
            </div>
            <div style="font-weight:700;font-size:14px;color:var(--black);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.customerName}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:11px;font-weight:700;color:${isLate?'#b91c1c':'rgba(3,69,67,.4)'}">${isLate?`⚠ ${Math.abs(dLeft)}h`:dLeft===0?'⏰ Hari ini':`${dLeft}h lagi`}</div>
            <div style="font-size:11px;font-weight:700;color:var(--black);margin-top:2px">${fmtCurrency(o.totalPrice)}</div>
            ${sisa>0&&o.totalPrice>0?`<div style="font-size:10px;color:#b91c1c">sisa ${fmtCurrency(sisa)}</div>`:''}
          </div>
        </div>
      </a>`
    }).join('')
  }
</script>
</body>
</html>
